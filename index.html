<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #059669; 
            --target: #2563eb; 
            --danger: #e11d48; 
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
            --input-bg: #f8fafc;
            --border-color: #f0f0f0;
        }

        /* 기본 레이아웃 */
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }
        
        /* 공통 카드 및 입력창 스타일 */
        .card-base { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid var(--border-color); }
        .input-base { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; background: var(--white); outline: none; transition: var(--transition); }
        .input-base:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: var(--input-bg); }
        .price-box label { font-size: 0.7rem; color: var(--text-light); display: block; margin-bottom: 2px; }
        .price-box input { border: none; background: transparent; width: 100%; font-weight: 600; outline: none; }

        /* 사이드바 */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: var(--transition); z-index: 2000; }
        .total-asset-box { padding: 10px 20px 20px 20px; text-align: right; border-bottom: 1px solid #334155; }
        .total-asset-box div { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }

        /* 메인 콘텐츠 영역 */
        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* 유틸리티 클래스 */
        .text-muted { font-size: 0.7rem; opacity: 0.7; }
        .flex-row { display: flex; gap: 8px; }
        .flex-1 { flex: 1; }

        /* 기존 스타일 유지 및 보정 */
        #item-list { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; transition: var(--transition); border-left: 4px solid transparent; }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item); border-left-color: var(--accent); }
        
        /* 반응형 */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            .mobile-overlay.active { display: block; }
        }

        /* 로딩/로그인 오버레이 */
        #login-overlay, #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

<div id="loading-overlay">데이터를 불러오는 중...</div>

<div id="login-overlay" style="display:none;">
    <div class="card-base" style="width: 320px; text-align: center; color: var(--text-dark);">
        <h2 style="color: var(--accent);">STOCK HUB</h2>
        <input type="email" id="login-email" class="input-base" placeholder="이메일" style="margin-bottom: 8px;">
        <input type="password" id="login-pw" class="input-base" placeholder="비밀번호" style="margin-bottom: 15px;">
        <button id="btn-login" class="input-base" style="background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold;">로그인</button>
    </div>
</div>

<div class="mobile-overlay" id="mobile-overlay"></div>

<div id="sidebar">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 900; font-size: 1.2rem; cursor: pointer;" id="logo">STOCK HUB</span>
        <button id="btn-add-item" style="background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;">+ 추가</button>
    </div>
    
    <div class="total-asset-box">
        <span class="text-muted">총 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    
    <div id="item-list"></div>
    
    <div style="padding: 12px; border-top: 1px solid #2d3139;">
        <button id="btn-logout" style="width: 100%; padding: 10px; border-radius: 8px; background: transparent; color: var(--danger); border: 1px solid var(--danger); cursor: pointer; font-size: 0.85rem;">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <button id="btn-menu-toggle" style="background: white; border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; cursor: pointer;">☰</button>
        <h2 id="view-title" style="margin: 0; font-size: 1.1rem; font-weight: 900;">Market Dashboard</h2>
        <button id="btn-go-home" style="background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">🏠 메인</button>
    </div>

    <div id="main-dashboard">
        <div class="card-base" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label class="text-muted">평가 합계</label><div id="main-total-stock" style="font-size: 1.2rem; font-weight: 800;">0원</div></div>
                <div><label class="text-muted">예수금</label><div id="main-display-cash" style="font-size: 1.2rem; font-weight: 800;">0원</div></div>
            </div>
        </div>

        <div class="card-base">
            <label style="font-size: 0.8rem; font-weight: 800; display: block; margin-bottom: 10px;">💰 예수금 관리</label>
            <input type="number" id="cash-input" class="input-base" placeholder="금액 입력" style="background: var(--input-bg);">
        </div>
        
        </div>

    <div id="editor" style="display:none;">
        <div class="flex-row" style="justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <input type="text" id="item-title" class="input-base" style="font-size: 1.5rem; font-weight: 800; border: none; padding: 0;" placeholder="종목명">
            <button id="btn-delete-stock" style="color: var(--danger); background: #fee2e2; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">삭제</button>
        </div>

        <div class="card-base">
            <label style="font-size: 0.75rem; font-weight: 800; display: block; margin-bottom: 12px;">💼 보유 현황</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="price-box"><label>수량</label><input type="number" data-field="holdCount"></div>
                <div class="price-box"><label>평단가</label><input type="number" data-field="holdAvg"></div>
            </div>
        </div>

        </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = { /* 기존 설정 유지 */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // 상태 관리 변수
    let items = [], currentId = null, userCash = 0;

    // 초기화 및 이벤트 바인딩
    document.addEventListener('DOMContentLoaded', () => {
        // 이벤트 위임: 입력창 값이 바뀔 때 자동으로 데이터 업데이트
        document.querySelector('#main-content').addEventListener('input', (e) => {
            const field = e.target.dataset.field;
            if (field && currentId) {
                updateItemData(currentId, field, e.target.value);
            }
        });

        // 버튼 클릭 이벤트 통합 관리
        document.addEventListener('click', (e) => {
            const id = e.target.id;
            if (id === 'btn-login') handleLogin();
            if (id === 'btn-logout') handleLogout();
            if (id === 'btn-add-item') addNewItem();
            if (id === 'btn-go-home' || id === 'logo') goHome();
            if (id === 'btn-menu-toggle') toggleMenu();
        });

        // 예수금 입력 처리
        document.getElementById('cash-input').addEventListener('input', (e) => {
            userCash = parseFloat(e.target.value) || 0;
            saveUserCash();
        });

        checkAuth();
    });

    // 핵심 기능 함수들
    function updateItemData(itemId, field, value) {
        const item = items.find(i => i.id === itemId);
        if (item) {
            item[field] = value;
            db.ref(`users/${auth.currentUser.uid}/items/${itemId}`).update({ [field]: value });
            calculateTotals();
        }
    }

    function calculateTotals() {
        let totalStockValue = 0;
        items.forEach(item => {
            const count = parseFloat(item.holdCount) || 0;
            const avg = parseFloat(item.holdAvg) || 0;
            totalStockValue += (count * avg);
        });

        document.getElementById('total-asset-value').textContent = (totalStockValue + userCash).toLocaleString() + '원';
        document.getElementById('main-total-stock').textContent = totalStockValue.toLocaleString() + '원';
        document.getElementById('main-display-cash').textContent = userCash.toLocaleString() + '원';
    }

    // 뷰 전환 로직
    function showView(viewId) {
        ['main-dashboard', 'editor', 'profile-section'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = (id === viewId) ? 'block' : 'none';
        });
    }

    /* 나머지 Firebase 통신 및 UI 렌더링 함수들 (renderList, checkAuth 등)은 
       기존 로직을 유지하되 공통 함수를 사용하도록 호출부를 수정하면 됩니다. */
</script>
</body>
</html>
