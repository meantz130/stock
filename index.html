<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #10b981;
            --target: #3b82f6;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        #login-overlay, #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sidebar-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        #loading-overlay { z-index: 10000; color: white; font-weight: bold; font-size: 1.2rem; }
        
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        #sidebar { 
            width: 260px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
            height: 100vh;
        }
        
        .total-asset-box {
            padding: 15px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #2d3139;
            text-align: right;
        }
        .total-asset-box span { color: var(--text-light); font-size: 0.7rem; display: block; margin-bottom: 2px; }
        .total-asset-box div { color: var(--white); font-weight: 800; font-size: 1.1rem; }

        #item-list { flex: 1; overflow-y: auto; }
        .list-item { 
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item) !important; border-left-color: var(--accent); }

        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .home-btn {
            background: var(--white); border: 1px solid #e2e8f0; padding: 8px 15px;
            border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 6px; color: var(--text-dark);
        }

        .summary-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; 
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .summary-item label { font-size: 0.75rem; opacity: 0.7; display: block; margin-bottom: 5px; }
        .summary-item div { font-size: 1.2rem; font-weight: 800; }

        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: #f8fafc; }
        .price-box label { font-size: 0.7rem; font-weight: bold; color: var(--text-light); margin-bottom: 3px; display: block; }
        
        input, textarea { width: 100%; border: none; padding: 4px 0; font-size: 0.95rem; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        
        .history-item { background: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; font-size: 0.85rem; }
        .pagination-ctrl button { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* 수익실현 입력 스타일 */
        .realized-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .realized-input-group input { background: #f1f5f9; padding: 10px; border-radius: 8px; flex: 1; }
        .realized-input-group button { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중...</div>
<div id="login-overlay" style="display:none;">
    <div class="login-card">
        <h2>STOCK HUB</h2>
        <input type="email" id="login-email" placeholder="이메일">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
    </div>
</div>

<div id="sidebar">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ 추가</button>
    </div>
    <div class="total-asset-box">
        <span>총 자산 (평가액 + 예수금)</span>
        <div id="total-asset-value">0원</div>
    </div>
    <div id="item-list"></div>
    <div style="padding:12px; border-top:1px solid #2d3139;">
        <button onclick="handleLogout()" style="width:100%; padding:10px; background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:8px; cursor:pointer;">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <h2 id="view-title" style="margin:0; font-size:1.2rem; font-weight:900;">Market Intelligence</h2>
        <button class="home-btn" onclick="goHome()">🏠 메인 대시보드</button>
    </div>

    <div id="main-dashboard">
        <div class="summary-card">
            <div class="summary-grid">
                <div class="summary-item"><label>현 보유자산 평가합계</label><div id="main-total-stock">0원</div></div>
                <div class="summary-item"><label>예수금(현금)</label><div id="main-display-cash">0원</div></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">💰 예수금 관리</label>
            <input type="number" id="cash-input" placeholder="현금 입력 후 자동저장" oninput="updateCash(this.value)" style="background:#f1f5f9; padding:12px; border-radius:8px;">
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">📈 수익실현 기록</label>
            <div class="realized-input-group">
                <input type="text" id="realized-name" placeholder="주식이름">
                <input type="number" id="realized-price" placeholder="수익금액">
                <button onclick="addRealizedProfit()">기록</button>
            </div>
            <div id="realized-list" style="margin-top:15px;"></div>
            <div class="pagination-ctrl" id="realized-pager"></div>
        </div>
    </div>

    <div class="editor-container" id="editor" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <input type="text" id="item-title" placeholder="종목명" oninput="updateField('title', this.value)" style="font-size:1.5rem; font-weight:800;">
            <button onclick="deleteStock()" style="color:var(--danger); background:#fee2e2; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">삭제</button>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">💼 보유 현황</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="price-box"><label>수량</label><input type="number" id="hold-count" oninput="updateField('holdCount', this.value)"></div>
                <div class="price-box"><label>평단가</label><input type="number" id="hold-avg" oninput="updateField('holdAvg', this.value)"></div>
            </div>
            <div style="margin-top:15px; text-align:right;">
                <span id="profit-percent" style="font-size:1.2rem; font-weight:800;">0.00%</span>
                <div id="profit-amount" style="font-size:0.9rem; font-weight:700;">0원</div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">🎯 희망 진입 전략</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <div class="price-box"><label>1차 희망가</label><input type="number" id="target-1" placeholder="입력" oninput="updateField('target1', this.value)"></div>
                <div class="price-box"><label>2차 희망가</label><input type="number" id="target-2" placeholder="입력" oninput="updateField('target2', this.value)"></div>
                <div class="price-box"><label>3차 희망가</label><input type="number" id="target-3" placeholder="입력" oninput="updateField('target3', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">📅 종가 히스토리</label>
            <input type="number" id="manual-close-input" placeholder="금액 입력 + Enter" onkeydown="handleManualSave(event)" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px;">
            <div id="history-list"></div>
            <div class="pagination-ctrl" id="history-pager"></div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:10px;">📝 메모</label>
            <textarea id="field-memo" rows="4" oninput="updateField('memo', this.value)" style="font-weight:400;"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], realizedProfits = [], currentId = null, userCash = 0;
    let historyPage = 1, realizedPage = 1;
    const historyLimit = 10, realizedLimit = 10;

    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(email, pw);
    }
    function handleLogout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged((user) => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            initApp();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function initApp() {
        db.ref('stocks').on('value', (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderList();
            calculateTotal();
            if(currentId) syncEditor();
        });
        db.ref('user_cash').on('value', (snap) => {
            userCash = Number(snap.val()) || 0;
            document.getElementById('cash-input').value = userCash || "";
            calculateTotal();
        });
        db.ref('realized_profits').on('value', (snap) => {
            const data = snap.val();
            realizedProfits = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).reverse() : [];
            renderRealizedList();
        });
    }

    // 자산 합계 계산 로직
    function calculateTotal() {
        let stockTotal = 0;
        items.forEach(item => {
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            const price = history.length > 0 ? history[0].price : (Number(item.holdAvg) || 0);
            stockTotal += (Number(item.holdCount) || 0) * price;
        });
        document.getElementById('main-total-stock').innerText = stockTotal.toLocaleString() + "원";
        document.getElementById('main-display-cash').innerText = userCash.toLocaleString() + "원";
        document.getElementById('total-asset-value').innerText = (stockTotal + userCash).toLocaleString() + "원";
    }

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `list-item ${currentId === item.id ? 'selected-active' : ''}`;
            div.onclick = () => { 
                currentId = item.id; historyPage = 1;
                document.getElementById('main-dashboard').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                syncEditor();
                renderList();
            };
            div.innerHTML = `<strong>${item.title || "새 종목"}</strong>`;
            container.appendChild(div);
        });
    }

    // 수익실현 기록 추가
    function addRealizedProfit() {
        const name = document.getElementById('realized-name').value;
        const price = document.getElementById('realized-price').value;
        if(!name || !price) return alert("종목명과 금액을 입력해주세요.");
        
        db.ref('realized_profits').push({
            name: name,
            price: Number(price),
            date: new Date().toLocaleDateString(),
            ts: Date.now()
        });
        document.getElementById('realized-name').value = '';
        document.getElementById('realized-price').value = '';
        realizedPage = 1;
    }

    // 수익실현 목록 렌더링 (10개 페이징)
    function renderRealizedList() {
        const container = document.getElementById('realized-list');
        const pager = document.getElementById('realized-pager');
        container.innerHTML = '';
        
        const totalPages = Math.ceil(realizedProfits.length / realizedLimit) || 1;
        const paged = realizedProfits.slice((realizedPage-1)*realizedLimit, realizedPage*realizedLimit);

        paged.forEach(p => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>[${p.date}] <strong>${p.name}</strong></span> <b style="color:var(--danger)">+${p.price.toLocaleString()}원</b> <span style="cursor:pointer;opacity:0.3" onclick="deleteRealized('${p.id}')">×</span>`;
            container.appendChild(div);
        });

        pager.innerHTML = `
            <button onclick="changeRealizedPage(-1)" ${realizedPage === 1 ? 'disabled' : ''}>이전</button>
            <span>${realizedPage} / ${totalPages}</span>
            <button onclick="changeRealizedPage(1)" ${realizedPage === totalPages ? 'disabled' : ''}>다음</button>
        `;
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;

        const historyArr = item.manualHistory ? Object.entries(item.manualHistory).map(([k, v]) => ({k, ...v})).sort((a,b) => b.ts - a.ts) : [];
        const latestPrice = historyArr.length > 0 ? historyArr[0].price : 0;
        const count = Number(item.holdCount) || 0, avg = Number(item.holdAvg) || 0;
        
        const evalAmt = count * (latestPrice || avg);
        const buyAmt = count * avg;
        const diff = evalAmt - buyAmt;
        const percent = buyAmt > 0 ? (diff / buyAmt) * 100 : 0;

        document.getElementById('profit-amount').innerText = `${diff.toLocaleString()}원`;
        document.getElementById('profit-percent').innerText = `${percent.toFixed(2)}%`;
        document.getElementById('profit-percent').style.color = percent >= 0 ? 'var(--danger)' : 'var(--target)';

        const fields = {
            'item-title': item.title, 'hold-count': item.holdCount, 'hold-avg': item.holdAvg, 'field-memo': item.memo,
            'target-1': item.target1, 'target-2': item.target2, 'target-3': item.target3
        };
        Object.entries(fields).forEach(([id, val]) => { 
            if(document.activeElement.id !== id) document.getElementById(id).value = val || ""; 
        });
        renderHistory(historyArr);
    }

    function renderHistory(historyArr) {
        const hList = document.getElementById('history-list');
        const pager = document.getElementById('history-pager');
        hList.innerHTML = '';
        const totalPages = Math.ceil(historyArr.length / historyLimit) || 1;
        const paged = historyArr.slice((historyPage-1)*historyLimit, historyPage*historyLimit);

        paged.forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${h.date}</span> <b>${h.price.toLocaleString()}원</b> <span style="cursor:pointer;opacity:0.3" onclick="deleteHistory('${h.k}')">×</span>`;
            hList.appendChild(div);
        });

        pager.innerHTML = `
            <button onclick="changePage(-1)" ${historyPage === 1 ? 'disabled' : ''}>이전</button>
            <span>${historyPage} / ${totalPages}</span>
            <button onclick="changePage(1)" ${historyPage === totalPages ? 'disabled' : ''}>다음</button>
        `;
    }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value && currentId) {
            const now = new Date();
            const dateStr = `${String(now.getFullYear()).slice(-2)}.${now.getMonth()+1}.${now.getDate()}`;
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: Number(e.target.value), ts: Date.now() });
            e.target.value = '';
            historyPage = 1;
        }
    }

    function updateField(f, v) { if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); }
    function updateCash(v) { db.ref('user_cash').set(Number(v)); }
    function changePage(dir) { historyPage += dir; syncEditor(); }
    function changeRealizedPage(dir) { realizedPage += dir; renderRealizedList(); }
    function deleteHistory(k) { if(confirm("삭제?")) db.ref(`stocks/${currentId}/manualHistory/${k}`).remove(); }
    function deleteRealized(id) { if(confirm("수익 기록을 삭제하시겠습니까?")) db.ref(`realized_profits/${id}`).remove(); }
    function deleteStock() { if(confirm("종목 삭제?")) { db.ref(`stocks/${currentId}`).remove(); goHome(); } }
    function addNewItem() { db.ref('stocks').push({ title: "새 종목", holdCount: 0, holdAvg: 0 }); }
    function goHome() { 
        currentId = null; 
        document.getElementById('editor').style.display = 'none'; 
        document.getElementById('main-dashboard').style.display = 'block';
        renderList();
    }
</script>
</body>
</html>
