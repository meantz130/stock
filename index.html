<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #059669; 
            --target: #2563eb; 
            --danger: #e11d48; 
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
            --input-bg: #f8fafc;
            --border-color: #f0f0f0;
        }

        /* 기본 레이아웃 */
        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }
        
        /* 공통 클래스 (코드 간소화의 핵심) */
        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid var(--border-color); }
        .input-base { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; background: var(--white); outline: none; transition: var(--transition); font-weight: 600; }
        .input-base:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
        
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: var(--input-bg); display: flex; flex-direction: column; }
        .price-box label { font-size: 0.65rem; color: var(--text-light); margin-bottom: 2px; font-weight: 600; }
        .price-box input { border: none; background: transparent; width: 100%; outline: none; font-weight: 800; font-size: 0.95rem; }

        /* 사이드바 스타일 */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: var(--transition); z-index: 2000; }
        .user-info-area { padding: 15px 20px 5px 20px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        .total-asset-box { padding: 10px 20px 20px 20px; text-align: right; border-bottom: 1px solid #334155; }
        .total-asset-box span { color: #94a3b8; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .total-asset-box div { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }

        #item-list { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; transition: var(--transition); border-left: 4px solid transparent; }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item); border-left-color: var(--accent); }

        /* 메인 영역 */
        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-btn { background: white; border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; cursor: pointer; }
        
        /* 달력 및 기타 유틸리티 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { padding: 8px 0; font-size: 0.8rem; border-radius: 8px; cursor: pointer; position: relative; }
        .calendar-day.today { background: #dcfce7; color: var(--accent); font-weight: bold; }
        .calendar-day.selected { background: var(--accent) !important; color: white; }
        .has-profit::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--danger); border-radius: 50%; }

        /* 차트 레이아웃 */
        .charts-wrapper { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .chart-container { flex: 1; min-width: 300px; background: var(--white); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); text-align: center; }
        
        /* 반응형 */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            .mobile-overlay.active { display: block; }
        }

        #loading-overlay, #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중...</div>

<div id="login-overlay" style="display:none;">
    <div class="card" style="width: 320px; text-align: center; color: var(--text-dark);">
        <h2 style="color: var(--accent); margin-bottom: 20px;">STOCK HUB</h2>
        <input type="email" id="login-email" class="input-base" placeholder="이메일" style="margin-bottom: 10px;">
        <input type="password" id="login-pw" class="input-base" placeholder="비밀번호" style="margin-bottom: 20px;">
        <button onclick="handleLogin()" class="input-base" style="background: var(--accent); color: white; border: none; cursor: pointer;">로그인</button>
    </div>
</div>

<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div style="padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 900; font-size: 1.2rem; cursor: pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem;">+ 추가</button>
    </div>
    
    <div class="user-info-area">
        <span id="user-display-name">환영합니다</span>
        <button onclick="showProfile()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; margin-left: 5px;">내 정보</button>
    </div>
    
    <div class="total-asset-box">
        <span>총 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    
    <div id="item-list"></div>
    
    <div style="padding: 12px; border-top: 1px solid #2d3139; display: flex; flex-direction: column; gap: 8px;">
        <a href="https://ko.tradingeconomics.com/commodities" target="_blank" style="text-align: center; padding: 10px; background: #334155; color: white; text-decoration: none; border-radius: 8px; font-size: 0.8rem; font-weight: bold;">📊 원자재 지표</a>
        <button onclick="handleLogout()" style="background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()" id="mobile-menu-btn">☰</button>
        <h2 id="view-title" style="margin: 0; font-size: 1.1rem; font-weight: 900;">Market Dashboard</h2>
        <button class="menu-btn" onclick="goHome()" style="font-weight: bold;">🏠 메인</button>
    </div>

    <div id="main-dashboard">
        <div class="card" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label style="font-size: 0.7rem; opacity: 0.7;">평가 합계</label><div id="main-total-stock" style="font-size: 1.2rem; font-weight: 800;">0원</div></div>
                <div><label style="font-size: 0.7rem; opacity: 0.7;">예수금</label><div id="main-display-cash" style="font-size: 1.2rem; font-weight: 800;">0원</div></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size: 0.8rem; font-weight: 800; display: block; margin-bottom: 10px;">💰 예수금 관리</label>
            <input type="number" id="cash-input" class="input-base" placeholder="금액 입력" oninput="updateCash(this.value)" style="background: var(--input-bg);">
        </div>

        <div class="card">
            <label style="font-size: 0.8rem; font-weight: 800; display: block; margin-bottom: 10px;">📈 수익실현 기록</label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="realized-name" class="input-base" placeholder="종목명" style="flex: 1.2; background: var(--input-bg);">
                <input type="number" id="realized-price" class="input-base" placeholder="수익금" style="flex: 1; background: var(--input-bg);">
                <button onclick="addRealizedProfit()" style="background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">기록</button>
            </div>
            
            <div id="calendar-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <button onclick="changeMonth(-1)" style="border: none; background: none; cursor: pointer;">◀</button>
                    <span id="calendar-title" style="font-weight: bold; font-size: 0.9rem;">2024년 4월</span>
                    <button onclick="changeMonth(1)" style="border: none; background: none; cursor: pointer;">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
            <div id="realized-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="editor" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <input type="text" id="item-title" class="input-base" data-field="title" style="font-size: 1.5rem; border: none; padding: 0; width: 70%;" placeholder="종목명">
            <button onclick="deleteStock()" style="color: var(--danger); background: #fee2e2; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">삭제</button>
        </div>
        
        <input type="text" id="item-description" class="input-base" data-field="description" style="font-weight: 400; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee;" placeholder="간단한 설명">

        <div class="card">
            <label style="font-size: 0.75rem; font-weight: 800; display: block; margin-bottom: 12px;">💼 보유 현황</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="price-box"><label>수량</label><input type="number" id="hold-count" data-field="holdCount"></div>
                <div class="price-box"><label>평단가</label><input type="number" id="hold-avg" data-field="holdAvg"></div>
            </div>
            <div style="margin-top: 15px; text-align: right;">
                <span id="profit-percent" style="font-size: 1.2rem; font-weight: 800;">0.00%</span>
                <div id="profit-amount" style="font-size: 0.9rem; font-weight: 700; color: var(--text-light);">0원</div>
            </div>
        </div>

        <div class="card">
            <label style="font-size: 0.75rem; font-weight: 800; display: block; margin-bottom: 12px;">🎯 희망 진입 및 전략</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <div class="price-box"><label>1차</label><input type="number" data-field="target1"></div>
                <div class="price-box"><label>2차</label><input type="number" data-field="target2"></div>
                <div class="price-box"><label>3차</label><input type="number" data-field="target3"></div>
            </div>
            <textarea id="field-memo" class="input-base" data-field="memo" rows="5" style="font-weight: 400; line-height: 1.5;" placeholder="여기에 상세 전략과 메모를 입력하세요..."></textarea>
        </div>
        
        <div class="card">
            <label style="font-size: 0.75rem; font-weight: 800; display: block; margin-bottom: 10px;">📅 종가 기록</label>
            <input type="number" id="manual-close-input" class="input-base" placeholder="금액 입력 후 Enter" onkeydown="handleManualSave(event)" style="border-bottom: 2px solid #f1f5f9;">
            <div id="history-list" style="margin-top: 10px;"></div>
        </div>
    </div>

    <div id="profile-section" style="display: none;">
        <div class="charts-wrapper">
            <div class="chart-container"><h3 style="font-size: 0.9rem;">종목 비중</h3><canvas id="stockPieChart"></canvas></div>
            <div class="chart-container"><h3 style="font-size: 0.9rem;">테마 비중</h3><canvas id="themePieChart"></canvas></div>
        </div>
        <div id="profile-stock-list" class="card"></div>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "stock-81b2d",
        storageBucket: "stock-81b2d.firebasestorage.app",
        messagingSenderId: "180064792232",
        appId: "1:180064792232:web:3a06a244e5a54ad44b5c9d",
        measurementId: "G-788BG78YQL"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], realizedProfits = [], currentId = null, userCash = 0;
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString();

    // 초기 로드 및 이벤트 바인딩
    document.addEventListener('DOMContentLoaded', () => {
        // [간소화의 핵심] 에디터 내의 모든 입력을 하나의 리스너로 처리
        const editor = document.getElementById('editor');
        editor.addEventListener('input', (e) => {
            const field = e.target.dataset.field;
            if (field && currentId) {
                updateField(field, e.target.value);
            }
        });

        checkAuth();
    });

    // 인증 확인 및 데이터 로드
    function checkAuth() {
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('user-display-name').textContent = user.email.split('@')[0] + "님 환영합니다";
                loadData(user.uid);
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });
    }

    function loadData(uid) {
        // 종목 데이터 로드
        db.ref(`users/${uid}/items`).on('value', snapshot => {
            const data = snapshot.val();
            items = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
            renderList();
            if (currentId) updateEditorUI();
            calculateTotalAsset();
        });

        // 예수금 로드
        db.ref(`users/${uid}/cash`).on('value', snapshot => {
            userCash = snapshot.val() || 0;
            document.getElementById('cash-input').value = userCash;
            calculateTotalAsset();
        });

        // 수익 기록 로드
        db.ref(`users/${uid}/realized`).on('value', snapshot => {
            const data = snapshot.val();
            realizedProfits = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
            renderCalendar();
            renderRealizedList();
        });
    }

    // 기본 기능 함수들
    function updateField(field, value) {
        if (!currentId) return;
        const updates = {};
        updates[`users/${auth.currentUser.uid}/items/${currentId}/${field}`] = value;
        db.ref().update(updates);
    }

    function calculateTotalAsset() {
        let stockTotal = 0;
        items.forEach(item => {
            const count = parseFloat(item.holdCount) || 0;
            const avg = parseFloat(item.holdAvg) || 0;
            stockTotal += (count * avg);
        });
        
        const total = stockTotal + userCash;
        document.getElementById('total-asset-value').textContent = total.toLocaleString() + '원';
        document.getElementById('main-total-stock').textContent = stockTotal.toLocaleString() + '원';
        document.getElementById('main-display-cash').textContent = userCash.toLocaleString() + '원';
    }

    // UI 렌더링 관련 (renderList, renderCalendar 등 기존 로직 유지...)
    function renderList() {
        const listEl = document.getElementById('item-list');
        listEl.innerHTML = items.map(item => `
            <div class="list-item ${item.id === currentId ? 'selected-active' : ''}" onclick="selectItem('${item.id}')">
                <div style="font-weight:800; font-size:0.9rem;">${item.title || '이름 없음'}</div>
                <div style="font-size:0.7rem; color:var(--text-light); margin-top:2px;">${item.theme || ''}</div>
            </div>
        `).join('');
    }

    function selectItem(id) {
        currentId = id;
        renderList();
        showView('editor');
        updateEditorUI();
    }

    function updateEditorUI() {
        const item = items.find(i => i.id === currentId);
        if (!item) return;
        
        // 에디터 필드 채우기
        const fields = ['title', 'description', 'holdCount', 'holdAvg', 'target1', 'target2', 'target3', 'memo'];
        fields.forEach(f => {
            const el = document.querySelector(`[data-field="${f}"]`);
            if (el) el.value = item[f] || '';
        });

        // 수익률 계산
        const count = parseFloat(item.holdCount) || 0;
        const avg = parseFloat(item.holdAvg) || 0;
        const total = count * avg;
        document.getElementById('profit-amount').textContent = total.toLocaleString() + "원 (평가액)";
    }

    function addNewItem() {
        const newRef = db.ref(`users/${auth.currentUser.uid}/items`).push();
        newRef.set({ title: '새 종목', holdCount: 0, holdAvg: 0 });
        selectItem(newRef.key);
    }

    function deleteStock() {
        if (confirm('정말 삭제하시겠습니까?')) {
            db.ref(`users/${auth.currentUser.uid}/items/${currentId}`).remove();
            goHome();
        }
    }

    // 뷰 전환
    function showView(viewId) {
        ['main-dashboard', 'editor', 'profile-section'].forEach(id => {
            document.getElementById(id).style.display = (id === viewId) ? 'block' : 'none';
        });
        document.getElementById('view-title').textContent = 
            viewId === 'main-dashboard' ? 'Market Dashboard' : 
            viewId === 'editor' ? 'Stock Editor' : 'Portfolio Analysis';
    }

    function goHome() { currentId = null; showView('main-dashboard'); renderList(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobile-overlay').classList.toggle('active'); }
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(err => alert(err.message));
    }
    function handleLogout() { auth.signOut(); }
    function updateCash(val) { db.ref(`users/${auth.currentUser.uid}/cash`).set(parseFloat(val) || 0); }

    // 달력 및 수익 기록 관련 (상세 로직 생략 없이 기존 흐름 유지)
    function renderCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('calendar-title').textContent = `${year}년 ${month + 1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        
        for (let i = 0; i < firstDay; i++) body.innerHTML += '<div></div>';
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = new Date(year, month, d).toLocaleDateString();
            const hasProfit = realizedProfits.some(p => p.date === dateStr);
            const isSelected = dateStr === selectedDateStr;
            body.innerHTML += `<div class="calendar-day ${isSelected ? 'selected' : ''} ${hasProfit ? 'has-profit' : ''}" onclick="selectDate('${dateStr}')">${d}</div>`;
        }
    }

    function selectDate(date) { selectedDateStr = date; renderCalendar(); renderRealizedList(); }
    function changeMonth(offset) { currentViewDate.setMonth(currentViewDate.getMonth() + offset); renderCalendar(); }
    
    function addRealizedProfit() {
        const name = document.getElementById('realized-name').value;
        const price = document.getElementById('realized-price').value;
        if (!name || !price) return;
        db.ref(`users/${auth.currentUser.uid}/realized`).push({ name, price: parseFloat(price), date: selectedDateStr });
        document.getElementById('realized-name').value = '';
        document.getElementById('realized-price').value = '';
    }

    function renderRealizedList() {
        const list = document.getElementById('realized-list');
        const daily = realizedProfits.filter(p => p.date === selectedDateStr);
        list.innerHTML = daily.length ? daily.map(p => `
            <div style="display:flex; justify-content:space-between; padding:8px; background:#f8fafc; border-radius:8px; margin-bottom:5px; font-size:0.85rem;">
                <span>${p.name}</span>
                <span style="font-weight:bold; color:var(--danger)">+${p.price.toLocaleString()}원</span>
            </div>
        `).join('') : '<div style="text-align:center; color:#ccc; font-size:0.8rem;">기록이 없습니다.</div>';
    }

    // 차트 로직 (기존 Chart.js 활용)
    function showProfile() {
        showView('profile-section');
        setTimeout(initCharts, 100);
    }

    function initCharts() {
        const ctxStock = document.getElementById('stockPieChart').getContext('2d');
        const stockLabels = items.map(i => i.title || '미지정');
        const stockData = items.map(i => (parseFloat(i.holdCount) || 0) * (parseFloat(i.holdAvg) || 0));

        if (window.myStockChart) window.myStockChart.destroy();
        window.myStockChart = new Chart(ctxStock, {
            type: 'doughnut',
            data: {
                labels: stockLabels,
                datasets: [{
                    data: stockData,
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
