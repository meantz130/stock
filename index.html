<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #059669; 
            --target: #2563eb; 
            --danger: #e11d48; 
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        #sidebar { 
            width: 260px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            .mobile-overlay.active { display: block; }
        }

        #login-overlay, #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .user-info-area { padding: 15px 20px 5px 20px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        
        .total-asset-box { padding: 10px 20px 20px 20px; text-align: right; border-bottom: 1px solid #334155; }
        .total-asset-box span { color: #94a3b8; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .total-asset-box div { color: var(--white); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }

        #item-list { flex: 1; overflow-y: auto; }
        .list-item { 
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item); border-left-color: var(--accent); }
        .item-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 4px; }
        .item-info-left { font-size: 0.75rem; color: var(--text-light); }
        .item-info-right { font-size: 0.75rem; color: var(--target); font-weight: bold; }

        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-toggle { display: none; background: var(--white); border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
        .home-btn { background: var(--white); border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }

        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: #f8fafc; }
        input, textarea { width: 100%; border: none; padding: 4px 0; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        textarea { font-family: inherit; resize: none; font-weight: 400; font-size: 0.9rem; line-height: 1.5; }

        .sidebar-footer { padding: 12px; border-top: 1px solid #2d3139; display: flex; flex-direction: column; gap: 8px; }
        .footer-btn { width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; text-align: center; text-decoration: none; box-sizing: border-box; }
        .indicator-btn { background: #334155; color: white; border: none; }
        .logout-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        .history-item { background: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; font-size: 0.85rem; }
        .pagination-ctrl button { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* 추가: 달력 스타일 */
        .calendar-container { margin-top: 10px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-label { font-size: 0.7rem; font-weight: bold; color: var(--text-light); padding-bottom: 5px; }
        .calendar-day { padding: 8px 0; font-size: 0.8rem; border-radius: 8px; cursor: pointer; transition: background 0.2s; position: relative; }
        .calendar-day:hover { background: #e2e8f0; }
        .calendar-day.today { background: #dcfce7; color: var(--accent); font-weight: bold; }
        .calendar-day.selected { background: var(--accent) !important; color: white; }
        .has-profit::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--danger); border-radius: 50%; }
        
        /* 추가: 이달의 수익률 요약 */
        .monthly-summary { display: flex; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .summary-item { text-align: center; flex: 1; }
        .summary-label { font-size: 0.7rem; color: var(--text-light); display: block; margin-bottom: 4px; }
        .summary-value { font-size: 1rem; font-weight: 800; }

        /* 드래그 중인 항목 스타일 */
        .list-item.dragging {
            opacity: 0.5;
            background: var(--active-item);
            border: 1px dashed var(--accent); }

        /* 내 정보 관리 섹션 스타일 */
        #profile-section { display: none; }
        .profile-card { background: var(--white); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; }
        .info-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .info-table th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; color: var(--text-light); font-size: 0.8rem; }
        .info-table td { padding: 15px 12px; border-bottom: 1px solid #f8fafc; font-size: 0.9rem; }
        .proportion-bar-container { width: 100%; background: #edf2f7; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .proportion-bar { height: 100%; background: var(--accent); border-radius: 4px; }
        .btn-profile-nav { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; margin-left: 8px; font-weight: bold; transition: 0.2s; }
        .btn-profile-nav:hover { background: var(--accent); color: white; }

        /* 차트 컨테이너 레이아웃 */
        .charts-wrapper { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .chart-container { flex: 1; min-width: 300px; background: var(--white); padding: 20px; border-radius: 15px; border: 1px solid #f0f0f0; text-align: center; }
        .chart-container canvas { max-height: 250px; margin: 0 auto; }

        /* 하단 정보 레이아웃 */
        .info-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .info-box { flex: 1; min-width: 300px; }

        /* 1. 에디터 아이템 전체 간격 조정 (보유현황창과 띄우기) */
        .edit-item { margin-bottom: 25px; width: 100%; }

        /* 2. 테마 입력창 라벨 스타일 */
        .edit-item label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 8px; font-weight: 600; }
    
        /* 3. 테마 입력창 자체 스타일 (기존 입력창과 분위기 통일) */
        .edit-item input[type="text"] { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: 'Pretendard', sans-serif; font-size: 0.9rem; background-color: var(--white); transition: var(--transition); outline: none; }
        .theme-flex-row { display: flex; align-items: center; gap: 12px; }
        #edit-theme { width: 200px !important; flex-shrink: 0; }
    
        /* 4. 클릭(포커스) 시 강조 효과 */
        .edit-item input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
        
        .theme-tag { display: inline-block; padding: 4px 10px; background: rgba(5, 150, 105, 0.1); color: #059669; border-radius: 6px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(5, 150, 105, 0.2); }
        #theme-tag-display { margin-top: 0 !important; display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }

        /* 즐겨찾기 별 스타일 */
        .favorite-btn { cursor: pointer; font-size: 1.1rem; margin-right: 8px; transition: transform 0.2s ease; color: #4b5563; }
        .favorite-btn.active { color: #fbbf24; }
        .favorite-btn:hover { transform: scale(1.2); }

        /* 별 아이콘과 종목명이 나란히 배치되도록 수정 */
        .item-top { display: flex; align-items: center; font-weight: 800; font-size: 0.95rem; color: var(--white); }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중...</div>
<div id="login-overlay" style="display:none;">
    <div class="login-card">
        <h2>STOCK HUB</h2>
        <input type="email" id="login-email" placeholder="이메일">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
    </div>
</div>

<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div style="padding:20px 20px 10px 20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ 추가</button>
    </div>
    
    <div class="user-info-area">
        <span id="user-display-name">환영합니다. 사용자님</span>
        <button class="btn-profile-nav" onclick="showProfile()">내 정보 관리</button>
    </div>   
    <div class="total-asset-box">
        <span>총 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    
    <div id="item-list"></div>
    
    <div class="sidebar-footer">
        <a href="https://ko.tradingeconomics.com/commodities" target="_blank" class="footer-btn indicator-btn">📊 원자재 지표 확인</a>
        <button onclick="handleLogout()" class="footer-btn logout-btn">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h2 style="margin:0; font-size:1.1rem; font-weight:900;">Market Dashboard</h2>
        <button class="home-btn" onclick="goHome()">🏠 메인으로</button>
    </div>

    <div id="main-dashboard">
        <div class="card" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label style="font-size:0.7rem; opacity:0.7;">평가 합계</label><div id="main-total-stock" style="font-size:1.2rem; font-weight:800;">0원</div></div>
                <div><label style="font-size:0.7rem; opacity:0.7;">예수금</label><div id="main-display-cash" style="font-size:1.2rem; font-weight:800;">0원</div></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">💰 예수금 관리</label>
            <input type="number" id="cash-input" placeholder="금액 입력" oninput="updateCash(this.value)" style="background:#f1f5f9; padding:12px; border-radius:8px;">
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">📈 수익실현 기록</label>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="realized-name" placeholder="종목명" style="background:#f1f5f9; padding:10px; border-radius:8px; flex:1.2;">
                <input type="number" id="realized-price" placeholder="수익금" style="background:#f1f5f9; padding:10px; border-radius:8px; flex:1;">
                <button onclick="addRealizedProfit()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer;">기록</button>
            </div>

            <div class="monthly-summary">
                <div class="summary-item">
                    <span class="summary-label">이달의 수익금</span>
                    <div id="monthly-profit-sum" class="summary-value">0원</div>
                </div>
                <div class="summary-item" style="border-left: 1px solid #e2e8f0;">
                    <span class="summary-label">이달의 수익률</span>
                    <div id="monthly-profit-rate" class="summary-value">0%</div>
                </div>
            </div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer;">◀</button>
                    <span id="calendar-title" style="font-weight:bold; font-size:0.9rem;">2024년 4월</span>
                    <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer;">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>

            <div id="selected-date-title" style="font-size:0.75rem; font-weight:bold; margin: 15px 0 8px 0; color:var(--accent);">선택된 날짜 수익 목록</div>
            <div id="realized-list"></div>
            <div class="pagination-ctrl" id="realized-pager"></div>
        </div>
    </div>

    <div id="editor" style="display:none;">
        <div style="display:flex; flex-direction:column; margin-bottom:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <input type="text" id="item-title" oninput="updateField('title', this.value)" style="font-size:1.5rem; font-weight:800; width:70%;" placeholder="종목명">
                <button onclick="deleteStock()" style="color:var(--danger); background:#fee2e2; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">삭제</button>
            </div>
            <input type="text" id="item-description" oninput="updateField('description', this.value)" 
                style="font-size:0.9rem; font-weight:400; color:var(--text-light); margin-top:5px; border-bottom:1px solid #eee;"
                placeholder="이 주식에 대한 간단한 설명을 입력하세요">
        </div>

        <div class="edit-item" style="margin-top: 15px; margin-bottom: 25px;">
            <label>테마 / 카테고리</label>
            <div class="theme-flex-row"> <input type="text" id="edit-theme" oninput="updateField('theme', this.value)" placeholder="예: 반도체, 2차전지">
                <div id="theme-tag-display"></div> </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">💼 보유 현황</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="price-box"><label style="font-size:0.7rem; color:var(--text-light);">수량</label><input type="number" id="hold-count" oninput="updateField('holdCount', this.value)"></div>
                <div class="price-box"><label style="font-size:0.7rem; color:var(--text-light);">평단가</label><input type="number" id="hold-avg" oninput="updateField('holdAvg', this.value)"></div>
            </div>
            <div style="margin-top:15px; text-align:right;">
                <span id="profit-percent" style="font-size:1.2rem; font-weight:800;">0.00%</span>
                <div id="profit-amount" style="font-size:0.9rem; font-weight:700;">0원</div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">🎯 희망 진입 전략</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <div class="price-box"><label style="font-size:0.6rem;">1차</label><input type="number" id="target-1" oninput="updateField('target1', this.value)"></div>
                <div class="price-box"><label style="font-size:0.6rem;">2차</label><input type="number" id="target-2" oninput="updateField('target2', this.value)"></div>
                <div class="price-box"><label style="font-size:0.6rem;">3차</label><input type="number" id="target-3" oninput="updateField('target3', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">🚩 전략 상세 (범위 및 메모)</label>
    
            <div style="display:flex; gap:8px; margin-bottom:10px; align-items: stretch;">
                <div class="price-box" style="flex: 1; border-color: #dcfce7; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--accent); display:block; margin-bottom:4px;">단기 목표 (범위)</label>
                    <input type="text" id="short-target" placeholder="예: 100~120" oninput="updateField('shortTarget', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
                <div class="price-box" style="flex: 1.5; border-color: #f1f5f9; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--text-light); display:block; margin-bottom:4px;">단기 메모</label>
                    <input type="text" id="short-memo" placeholder="비중 조절 등 메모" oninput="updateField('shortMemo', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:10px; align-items: stretch;">
                <div class="price-box" style="flex: 1; border-color: #dbeafe; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--target); display:block; margin-bottom:4px;">중장기 목표 (범위)</label>
                    <input type="text" id="long-target" placeholder="예: 150~200" oninput="updateField('longTarget', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
                <div class="price-box" style="flex: 1.5; border-color: #f1f5f9; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--text-light); display:block; margin-bottom:4px;">중장기 메모</label>
                    <input type="text" id="long-memo" placeholder="재료 확인 등 메모" oninput="updateField('longMemo', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
            </div>

            <div style="display:flex; gap:8px; align-items: stretch;">
                <div class="price-box" style="flex: 1; border-color: #fee2e2; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--danger); display:block; margin-bottom:4px;">손절가 (범위)</label>
                    <input type="text" id="stop-loss" placeholder="예: 80~90" oninput="updateField('stopLoss', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
                <div class="price-box" style="flex: 1.5; border-color: #f1f5f9; padding: 8px;">
                    <label style="font-size:0.6rem; color: var(--text-light); display:block; margin-bottom:4px;">손절 메모</label>
                    <input type="text" id="stop-memo" placeholder="이탈 시 대응책" oninput="updateField('stopMemo', this.value)" style="font-weight:400; font-size:0.85rem;">
                </div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">📅 종가 기록 차트</label>
    
            <div style="width: 100%; height: 200px; margin-bottom: 20px;">
                <canvas id="closePriceLineChart"></canvas>
            </div>

            <input type="number" id="manual-close-input" placeholder="금액 입력 후 Enter" onkeydown="handleManualSave(event)" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px;">
            <div id="history-list"></div>
            <div class="pagination-ctrl" id="history-pager"></div>
        </div>
        
        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">📅 종가 기록</label>
            <input type="number" id="manual-close-input" placeholder="금액 입력 후 Enter" onkeydown="handleManualSave(event)" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px;">
            <div id="history-list"></div>
            <div class="pagination-ctrl" id="history-pager"></div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:10px;">📝 메모</label>
            <textarea id="field-memo" rows="6" placeholder="자유로운 기록..." oninput="updateField('memo', this.value)"></textarea>
        </div>
    </div>

    <div id="profile-section">
        <div class="top-bar">
            <h2 style="margin:0; font-size:1.1rem; font-weight:900;">포트폴리오 정밀 분석</h2>
        </div>

        <div class="charts-wrapper">
            <div class="chart-container">
                <h3 style="font-size:0.9rem; margin-bottom:15px;">종목별 비중</h3>
                <canvas id="stockPieChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="font-size:0.9rem; margin-bottom:15px;">테마별 비중</h3>
                <canvas id="themePieChart"></canvas>
            </div>
        </div>

        <div class="info-wrapper">
            <div class="info-box profile-card">
                <h3 style="font-size:0.9rem;">종목 상세</h3>
                <table class="info-table">
                    <thead>
                        <tr><th>종목명</th><th style="text-align:right;">비중</th></tr>
                    </thead>
                    <tbody id="profile-stock-list"></tbody>
                </table>
            </div>
            <div class="info-box profile-card">
                <h3 style="font-size:0.9rem;">테마 상세</h3>
                <table class="info-table">
                    <thead>
                        <tr><th>테마명</th><th style="text-align:right;">비중</th></tr>
                    </thead>
                    <tbody id="profile-theme-list"></tbody>
                </table>
            </div>
        </div>
    </div>  
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d",
        storageBucket: "stock-81b2d.firebasestorage.app",
        messagingSenderId: "180064792232",
        appId: "1:180064792232:web:3a06a244e5a54ad44b5c9d",
        measurementId: "G-788BG78YQL"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], realizedProfits = [], currentId = null, userCash = 0;
    let historyPage = 1, realizedPage = 1;
    const historyLimit = 8, realizedLimit = 10;

    // 추가: 달력 관련 변수
    let currentViewDate = new Date();
    let selectedDateStr = new Date().toLocaleDateString();

    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(err => alert("로그인 실패"));
    }
    function handleLogout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged((user) => {
        const loader = document.getElementById('loading-overlay');
        if (loader) loader.style.display = 'none';

        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            const userName = user.email ? user.email.split('@')[0] : "사용자";
            document.getElementById('user-display-name').innerText = `환영합니다. ${userName}님.`;
            initApp();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function initApp() {
        db.ref('stocks').on('value', (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderList();
            calculateTotal();
            if(currentId) syncEditor();
        });
        db.ref('user_cash').on('value', (snap) => {
            userCash = Number(snap.val()) || 0;
            const cashInput = document.getElementById('cash-input');
            if(cashInput) cashInput.value = userCash || "";
            calculateTotal();
        });
        db.ref('realized_profits').on('value', (snap) => {
            const data = snap.val();
            realizedProfits = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).reverse() : [];
            renderRealizedList();
            renderCalendar(); // 추가: 데이터 갱신 시 달력도 갱신
            calculateMonthlySummary(); // 추가: 이달의 수익 계산
        });
    }

    // 1. 전역 변수 영역에 추가
    let closePriceChart = null;

    // 2. 종가 차트를 그리는 함수 추가
    function renderClosePriceChart(history) {
        const canvas = document.getElementById('closePriceLineChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
    
        // 데이터가 없으면 초기화
        if (!history || Object.keys(history).length === 0) {
            if(closePriceChart) closePriceChart.destroy();
            closePriceChart = null;
            return;
        }

        // 데이터를 날짜순(오름차순)으로 정렬하여 최근 10개 추출
        const sortedData = Object.entries(history)
            .sort((a, b) => new Date(a[0]) - new Date(b[0]))
            .slice(-10);

        const labels = sortedData.map(item => {
            const d = new Date(item[0]);
            return `${d.getMonth() + 1}/${d.getDate()}`;
        });
        const prices = sortedData.map(item => item[1]);

        if (closePriceChart) {
            closePriceChart.data.labels = labels;
            closePriceChart.data.datasets[0].data = prices;
            closePriceChart.update();
        } else {
            closePriceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '종가',
                        data: prices,
                        borderColor: '#059669', // 테마 accent 컬러 사용
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        borderWidth: 2,
                        pointRadius: 3,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    }

    // 3. 기존 renderHistoryList() 함수 마지막에 차트 렌더링 호출 추가
    // function renderHistoryList() { ... 기존 코드 ... renderClosePriceChart(item.history); }  

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('mobile-overlay').classList.toggle('active');
    }

    function calculateTotal() {
        let totalStockEvaluation = 0;
        items.forEach(item => {
            const count = Number(item.holdCount) || 0;
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            const latestPrice = history.length > 0 ? Number(history[0].price) : (Number(item.holdAvg) || 0);
            totalStockEvaluation += count * latestPrice;
        });
        document.getElementById('main-total-stock').innerText = totalStockEvaluation.toLocaleString() + "원";
        document.getElementById('main-display-cash').innerText = userCash.toLocaleString() + "원";
        const totalAsset = totalStockEvaluation + userCash;
        document.getElementById('total-asset-value').innerText = totalAsset.toLocaleString() + "원";
    }

    // 추가: 이달의 수익률 및 합계 계산
    function calculateMonthlySummary() {
        // 1. 현재 달력이 보여주고 있는 년/월 기준 추출
        const viewYear = currentViewDate.getFullYear();
        const viewMonth = currentViewDate.getMonth();

        // 2. 해당 월의 데이터만 필터링
        const monthlyProfits = realizedProfits.filter(p => {
            const pDate = new Date(p.date);
            return pDate.getMonth() === viewMonth && pDate.getFullYear() === viewYear;
        });

        // 3. 수익 합계 계산
        const totalProfit = monthlyProfits.reduce((acc, cur) => acc + Number(cur.price), 0);

        // 4. 수익률 계산 (현재 총 자산 대비 해당 월의 수익금)
        const totalAssetStr = document.getElementById('total-asset-value').innerText.replace(/[^0-9.-]/g, '');
        const totalAsset = parseInt(totalAssetStr) || 1;
        const profitRate = (totalProfit / (totalAsset - totalProfit)) * 100; // 원금 대비 수익률 (근사치)

        const sumEl = document.getElementById('monthly-profit-sum');
        const rateEl = document.getElementById('monthly-profit-rate');
        const titleEl = document.querySelector('.monthly-summary .summary-label'); // 제목 변경용

        // 화면 반영
        if (sumEl && rateEl) {
            sumEl.innerText = totalProfit.toLocaleString() + "원";
            sumEl.style.color = totalProfit >= 0 ? 'var(--danger)' : 'var(--target)';
            rateEl.innerText = (totalProfit === 0 ? "0.00" : profitRate.toFixed(2)) + "%";
            rateEl.style.color = totalProfit >= 0 ? 'var(--danger)' : 'var(--target)';
        }
    }

    // 추가: 달력 렌더링 함수
    function renderCalendar() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const calendarBody = document.getElementById('calendar-body');
        calendarBody.innerHTML = '';

        // 요일 라벨
        ['일','월','화','수','목','금','토'].forEach(d => {
            const el = document.createElement('div');
            el.className = 'calendar-day-label';
            el.innerText = d;
            calendarBody.appendChild(el);
        });

        // 빈 칸
        for (let i = 0; i < firstDay; i++) {
            calendarBody.appendChild(document.createElement('div'));
        }

        // 날짜 채우기
        for (let d = 1; d <= lastDate; d++) {
            const dateStr = new Date(year, month, d).toLocaleDateString();
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day';
            if (dateStr === new Date().toLocaleDateString()) dayEl.classList.add('today');
            if (dateStr === selectedDateStr) dayEl.classList.add('selected');
            
            // 해당 날짜에 수익 기록이 있는지 확인
            const hasData = realizedProfits.some(p => new Date(p.date).toLocaleDateString() === dateStr);
            if (hasData) dayEl.classList.add('has-profit');

            dayEl.innerText = d;
            dayEl.onclick = () => {
                selectedDateStr = dateStr;
                realizedPage = 1;
                document.getElementById('selected-date-title').innerText = `${dateStr} 수익 목록`;
                renderCalendar();
                renderRealizedList();
            };
            calendarBody.appendChild(dayEl);
        }
    }

    // 추가: 달력 월 변경
    function changeMonth(diff) {
        currentViewDate.setMonth(currentViewDate.getMonth() + diff);
        // 2050년 제한
        if (currentViewDate.getFullYear() > 2050) currentViewDate.setFullYear(2050);
        renderCalendar();         // 달력 다시 그리기
        calculateMonthlySummary(); // 달 변경 시 수익 요약도 다시 계산
    }

    /* 최적화: 렌더링 부하를 줄이기 위한 변수 */
    let dragTimer = null;

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';

        // 1. 즐겨찾기(isFavorite)가 true인 항목을 위로, 그 안에서 order 순으로 정렬
        const sortedItems = [...items].sort((a, b) => {
            // 1순위: 즐겨찾기 여부 (true가 위로)
            const favA = a.isFavorite || false;
            const favB = b.isFavorite || false;
            if (favA !== favB) return favB - favA;

            // 2순위: 순서(order) 값 (작은 숫자가 위로)
            const orderA = (a.order === undefined || a.order === null) ? 0 : a.order;
            const orderB = (b.order === undefined || b.order === null) ? 0 : b.order;
            return orderA - orderB;
        });

        sortedItems.forEach((item) => {
            const div = document.createElement('div');
            div.className = `list-item ${currentId === item.id ? 'selected-active' : ''}`;
            div.setAttribute('draggable', true);
            div.dataset.id = item.id;

            // 드래그 이벤트 리스너
            div.addEventListener('dragstart', (e) => {
                div.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            
            div.addEventListener('dragend', () => {
                div.classList.remove('dragging');
                saveNewOrder();
            });

            div.onclick = () => {
                currentId = item.id; historyPage = 1;
                document.getElementById('main-dashboard').style.display = 'none';
                document.getElementById('profile-section').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
            
                if(window.innerWidth <= 768) toggleMenu();
                syncEditor();
                renderList();
            };
        
            const avg = Number(item.holdAvg || 0).toLocaleString();
            const t3 = item.target3 ? Number(item.target3).toLocaleString() : '-';
            const count = item.holdCount || 0;

            // 2. innerHTML 부분에 별 아이콘 추가 및 클릭 이벤트 할당
            // stopPropagation을 걸어줘야 별을 누를 때 상세창이 열리지 않습니다.
            div.innerHTML = `
                <div style="font-weight:bold; display:flex; align-items:center;">
                    <span class="favorite-btn" 
                          style="color:${item.isFavorite ? '#fbbf24' : '#4b5563'}; margin-right:8px; cursor:pointer; font-size:1.1rem;"
                          onclick="event.stopPropagation(); toggleFavorite('${item.id}', ${item.isFavorite || false})">
                        ${item.isFavorite ? '★' : '☆'}
                    </span>
                    <span style="pointer-events:none;">${item.title || "새 종목"}</span>
                    <span style="font-size:0.75rem; color:var(--text-light); font-weight:normal; margin-left:4px; pointer-events:none;">(${count})</span>
                </div>
                <div class="item-row" style="pointer-events:none; padding-left:24px;">
                    <div class="item-info-left">평단: ${avg}</div>
                    <div class="item-info-right">희망가: ${t3}</div>
                </div>`;
            container.appendChild(div);
        });

        // 컨테이너 드래그 오버 이벤트
        container.addEventListener('dragover', e => {
            e.preventDefault();
            if (typeof dragTimer !== 'undefined' && dragTimer) return;

            dragTimer = requestAnimationFrame(() => {
                const dragging = document.querySelector('.dragging');
                if (!dragging) return;

                const afterElement = getDragAfterElement(container, e.clientY);
                if (afterElement == null) {
                    container.appendChild(dragging);
                } else {
                    container.insertBefore(dragging, afterElement);
                }
                dragTimer = null;
            });
        });
    }

    // 드래그 위치 계산 함수
    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.list-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest; }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // 변경된 순서를 DB에 저장
    function saveNewOrder() {
        const listItems = [...document.querySelectorAll('#item-list .list-item')];
        const updates = {};
        listItems.forEach((el, index) => {
            const id = el.dataset.id;
            // 실제 데이터가 변경된 경우만 업데이트 객체에 추가
            const item = items.find(i => i.id === id);
            if (item && item.order !== index) {
                updates[`/stocks/${id}/order`] = index;
            }
        });

        if (Object.keys(updates).length > 0) {
            db.ref().update(updates);
        }
    }

    // 수정: 선택된 날짜의 데이터만 보여주도록 필터링 추가
    function renderRealizedList() {
        const container = document.getElementById('realized-list');
        const pager = document.getElementById('realized-pager');
        if (!container) return;
        container.innerHTML = '';

        // 추가: 선택된 날짜 데이터 필터링
        const filtered = realizedProfits.filter(p => new Date(p.date).toLocaleDateString() === selectedDateStr);
        
        const totalPages = Math.ceil(filtered.length / realizedLimit) || 1;
        const paged = filtered.slice((realizedPage-1)*realizedLimit, realizedPage*realizedLimit);
        
        if (paged.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-light); font-size:0.8rem;">해당 날짜의 기록이 없습니다.</div>';
            if(pager) pager.innerHTML = '';
            return;
        }

        paged.forEach(p => {
            const priceValue = Number(p.price) || 0;
            const isLoss = priceValue < 0;
            const color = isLoss ? 'var(--target)' : 'var(--danger)';
            const prefix = priceValue > 0 ? '+' : '';
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${p.name || '이름없음'}</span><b style="color:${color}">${prefix}${priceValue.toLocaleString()}원</b><span onclick="deleteRealized('${p.id}')" style="cursor:pointer; opacity:0.3; padding-left:10px;">×</span>`;
            container.appendChild(div);
        });
        if(pager) pager.innerHTML = `<button onclick="realizedPage=Math.max(1, realizedPage-1); renderRealizedList();">이전</button> <span>${realizedPage}/${totalPages}</span> <button onclick="realizedPage=Math.min(${totalPages}, realizedPage+1); renderRealizedList();">다음</button>`;
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;

        const historyArr = item.manualHistory ? Object.entries(item.manualHistory).map(([k, v]) => ({k, ...v})).sort((a,b) => b.ts - a.ts) : [];
    
        // 수익률 계산 로직
        const count = Number(item.holdCount) || 0;
        const avg = Number(item.holdAvg) || 0;
        const latestPrice = historyArr.length > 0 ? Number(historyArr[0].price) : 0;
        const buyTotal = count * avg;
        const currentEval = count * latestPrice;
        const diff = currentEval - buyTotal;
        const percent = buyTotal > 0 ? (diff / buyTotal) * 100 : 0;
    
        // UI 업데이트
        document.getElementById('profit-amount').innerText = `${diff > 0 ? '+' : ''}${Math.floor(diff).toLocaleString()}원`;
        document.getElementById('profit-percent').innerText = `${percent.toFixed(2)}%`;
        document.getElementById('profit-amount').style.color = diff >= 0 ? 'var(--danger)' : 'var(--target)';
        document.getElementById('profit-percent').style.color = diff >= 0 ? 'var(--danger)' : 'var(--target)';

        // 필드 값 동기화
        document.getElementById('item-title').value = item.title || "";
        document.getElementById('item-description').value = item.description || ""; 
        document.getElementById('edit-theme').value = item.theme || "";

        // [핵심 추가] 테마/카테고리 입력 시 바로 아래에 태그 형태로 표시
        const tagContainer = document.getElementById('theme-tag-display');
        if (tagContainer) {
            tagContainer.innerHTML = '';
            if(item.theme) {
                // 쉼표로 구분된 테마들을 각각 태그로 생성
                item.theme.split(',').forEach(t => {
                    if(t.trim()) {
                        const span = document.createElement('span');
                        span.className = 'theme-tag';
                        span.innerText = t.trim();
                        tagContainer.appendChild(span);
                    }
                });
            }
        }

        document.getElementById('hold-count').value = item.holdCount || "";
        document.getElementById('hold-avg').value = item.holdAvg || "";
        document.getElementById('target-1').value = item.target1 || "";
        document.getElementById('target-2').value = item.target2 || "";
        document.getElementById('target-3').value = item.target3 || "";
        document.getElementById('short-target').value = item.shortTarget || "";
        document.getElementById('short-memo').value = item.shortMemo || "";
        document.getElementById('long-target').value = item.longTarget || "";
        document.getElementById('long-memo').value = item.longMemo || "";
        document.getElementById('stop-loss').value = item.stopLoss || "";
        document.getElementById('stop-memo').value = item.stopMemo || "";
        document.getElementById('field-memo').value = item.memo || "";
    
        renderHistory(historyArr);
    }

    function renderHistory(arr) {
        const hList = document.getElementById('history-list');
        const pager = document.getElementById('history-pager');
        hList.innerHTML = '';
        const totalPages = Math.ceil(arr.length / historyLimit) || 1;
        const paged = arr.slice((historyPage-1)*historyLimit, historyPage*historyLimit);
        paged.forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${h.date}</span> <b>${h.price.toLocaleString()}원</b> <span onclick="deleteHistory('${h.k}')" style="cursor:pointer; opacity:0.2;">×</span>`;
            hList.appendChild(div);
        });
        pager.innerHTML = `<button onclick="historyPage=Math.max(1, historyPage-1); syncEditor();">이전</button> <span>${historyPage}/${totalPages}</span> <button onclick="historyPage=Math.min(${totalPages}, historyPage+1); syncEditor();">다음</button>`;
    }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value && currentId) {
            const now = new Date();
            const dateStr = `${String(now.getFullYear()).slice(-2)}.${now.getMonth()+1}.${now.getDate()}`;
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: Number(e.target.value), ts: Date.now() });
            e.target.value = '';
        }
    }
    function updateField(f, v) { if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); }
    function updateCash(v) { db.ref('user_cash').set(Number(v)); }
    function deleteHistory(k) { if(confirm("삭제?")) db.ref(`stocks/${currentId}/manualHistory/${k}`).remove(); }
    function deleteRealized(id) { if(confirm("기록 삭제?")) db.ref(`realized_profits/${id}`).remove(); }
    function deleteStock() { if(confirm("종목을 삭제하시겠습니까?")) { db.ref(`stocks/${currentId}`).remove(); goHome(); } }
    function addNewItem() { db.ref('stocks').push({ title: "새 종목", holdCount: 0, holdAvg: 0 }); }
    function goHome() { currentId = null; document.getElementById('editor').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'block'; renderList(); }
    
    function addRealizedProfit() {
        const name = document.getElementById('realized-name').value;
        const price = document.getElementById('realized-price').value;
        if(!name || price === "") return;
        // 수정: 날짜를 선택된 날짜(달력에서 클릭한 날짜) 기준으로 저장하거나 오늘 날짜로 저장
        const targetDate = (selectedDateStr === new Date().toLocaleDateString()) ? new Date() : new Date(selectedDateStr);
        db.ref('realized_profits').push({ 
            name, 
            price: Number(price), 
            date: targetDate.toLocaleDateString(), 
            ts: Date.now() 
        });
        document.getElementById('realized-name').value = '';
        document.getElementById('realized-price').value = '';
    }

    // 내 정보 관리 섹션 보기
    function showProfile() {
        currentId = null; // 에디터 비활성화
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('editor').style.display = 'none';
        document.getElementById('profile-section').style.display = 'block';
        if(window.innerWidth <= 768) toggleMenu();
        renderProfileData();
    }

    // 홈으로 갈 때 프로필 섹션 숨기기 위해 goHome 함수 수정
    const originalGoHome = goHome;
    goHome = function() {
        document.getElementById('profile-section').style.display = 'none';
        originalGoHome();
    };

    let stockChart = null;
    let themeChart = null;

    // [수정] 에디터 열 때 기존 정보 + 테마 값까지 로드
    function openEditor(id) {
        currentId = id;
        const item = items.find(i => i.id === id);
        if (!item) return;

        // 기존 입력 필드 값 채우기
        document.getElementById('edit-title').value = item.title || "";
        document.getElementById('edit-holdCount').value = item.holdCount || 0;
        document.getElementById('edit-holdAvg').value = item.holdAvg || 0;
        document.getElementById('edit-targetPrice').value = item.targetPrice || 0;
        document.getElementById('edit-description').value = item.description || "";
    
        // [새로 추가된 부분] 테마 값 불러오기
        document.getElementById('edit-theme').value = item.theme || "";

        // 화면 전환
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        renderHistory();
    }

    // [수정] 프로필 데이터 렌더링 및 차트 생성
    function renderProfileData() {
        const stockList = document.getElementById('profile-stock-list');
        const themeList = document.getElementById('profile-theme-list');
        if (!stockList || !themeList) return;

        stockList.innerHTML = ''; 
        themeList.innerHTML = '';
        
        // 추가: userCash가 정의되지 않았을 경우를 대비해 전역 변수나 userData에서 가져옴
        // 보통 이 앱 구조에서는 userCash 변수를 직접 쓰거나 userData.cash 형식을 사용합니다.
        const currentCash = (typeof userCash !== 'undefined') ? Number(userCash) : 0;

        let totalStockEval = 0; // 종목들의 합계만 먼저 계산할 변수
        let themeMap = {}; // 테마별 합계를 저장할 객체
    
        // 1. 데이터 가공 및 총 평가액 계산
        let profileData = items.map(item => {
            const count = Number(item.holdCount) || 0;
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            const latestPrice = history.length > 0 ? Number(history[0].price) : (Number(item.holdAvg) || 0);
            const evaluation = count * latestPrice;
        
            // 테마 추출 (여러 개일 경우 첫 번째 것을 주 테마로 사용)
            const theme = item.theme ? item.theme.split(',')[0].trim() : "미분류";

            if(evaluation > 0) {
                totalStockEval += evaluation;
                themeMap[theme] = (themeMap[theme] || 0) + evaluation;
            }
            return { ...item, evaluation, count, theme };
        }).filter(item => item.count > 0).sort((a, b) => b.evaluation - a.evaluation);

        // 전체 자산 계산 (종목 총액 + 예수금)
        const totalEval = totalStockEval + currentCash;

        // 2. 종목별 리스트 및 차트 데이터 생성
        const stockLabels = [], stockValues = [];
        profileData.forEach(item => {
            const prop = totalEval > 0 ? ((item.evaluation / totalEval) * 100).toFixed(1) : 0;
            stockLabels.push(item.title); 
            stockValues.push(item.evaluation);
        
            stockList.innerHTML += `
                <tr>
                    <td><strong>${item.title}</strong><br><span style="font-size:0.7rem; color:var(--accent)">${item.theme}</span></td>
                    <td style="text-align:right;">${prop}%<br><small>${item.evaluation.toLocaleString()}원</small></td>
                </tr>`;
        });

        // --- 예수금 항목 추가 (종목 리스트/그래프) ---
        if ((Number(userCash) || 0) > 0) {
            const cashVal = Number(userCash);
            const cashProp = totalEval > 0 ? ((cashVal / totalEval) * 100).toFixed(1) : 0;
            stockLabels.push("예수금");
            stockValues.push(cashVal);
            stockList.innerHTML += `
                <tr>
                    <td><strong>예수금(현금)</strong></td>
                    <td style="text-align:right;">${cashProp}%<br><small>${cashVal.toLocaleString()}원</small></td>
                </tr>`;
            }

        // 3. 테마별 리스트 및 차트 데이터 생성
        const themeLabels = Object.keys(themeMap).sort((a,b) => themeMap[b] - themeMap[a]);
        const themeValues = themeLabels.map(label => themeMap[label]);
    
        themeLabels.forEach(label => {
            const prop = totalEval > 0 ? ((themeMap[label] / totalEval) * 100).toFixed(1) : 0;
            themeList.innerHTML += `
                <tr>
                    <td><strong>${label}</strong></td>
                    <td style="text-align:right;">${prop}%<br><small>${themeMap[label].toLocaleString()}원</small></td>
                </tr>`;
        });

        // --- 예수금 항목 추가 (테마 리스트/그래프) ---
        if ((Number(userCash) || 0) > 0) {
            const cashVal = Number(userCash);
            const cashProp = totalEval > 0 ? ((cashVal / totalEval) * 100).toFixed(1) : 0;
            themeLabels.push("예수금");
            themeValues.push(cashVal);
            themeList.innerHTML += `
                <tr>
                    <td><strong>예수금</strong></td>
                    <td style="text-align:right;">${cashProp}%<br><small>${cashVal.toLocaleString()}원</small></td>
                </tr>`;
            }

        // 4. Chart.js 그래프 그리기 호출
        drawPieChart('stockPieChart', stockLabels, stockValues, stockChart, (c) => stockChart = c);
        drawPieChart('themePieChart', themeLabels, themeValues, themeChart, (c) => themeChart = c);
    }

    // [추가] 공통 차트 그리기 함수
    function drawPieChart(canvasId, labels, data, chartInstance, setChartInstance) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (chartInstance) chartInstance.destroy();

        const newChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        // 1~10: 고대비 원색 및 밝은색
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', 
                        '#FF9F40', '#C9CBCF', '#4682B4', '#00FA9A', '#FF1493',
                        // 11~20: 파스텔 및 딥톤 혼합 (구분력 강화)
                        '#7B68EE', '#FFA07A', '#20B2AA', '#87CEFA', '#708090',
                        '#DA70D6', '#B0E0E6', '#F0E68C', '#6495ED', '#FF7F50'
                    ],
                    hoverOffset: 10,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            boxWidth: 10,
                            font: { size: 10 },
                            padding: 10
                        }
                    },
                    tooltip: {
                        enabled: true // 마우스 올렸을 때 이름과 수치 표시
                    }
                }
            }
        });
        setChartInstance(newChart);
    }
    
    function toggleFavorite(id, currentStatus) {
        if(!id) return;
    
        const newStatus = !currentStatus;

        // 1. 서버(Firebase) 업데이트
        db.ref('stocks/' + id).update({
            isFavorite: newStatus
        })
        .then(() => {
            // 2. 로컬 데이터 배열(items) 즉시 동기화
            const itemIndex = items.findIndex(item => item.id === id);
            if (itemIndex > -1) {
                items[itemIndex].isFavorite = newStatus;
            }
        
            // 3. 화면 갱신 (위의 수정된 정렬 로직이 적용됨)
            renderList();
        })
        .catch(err => {
            console.error("즐겨찾기 업데이트 실패:", err);
            alert("상태 변경에 실패했습니다.");
        });
    }
</script>
