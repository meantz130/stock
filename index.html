<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #059669; /* 깊은 에메랄드 */
            --target: #2563eb; /* 신뢰감 있는 블루 */
            --danger: #e11d48; /* 세련된 로즈 레드 */
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        /* 사이드바 및 모바일 대응 */
        #sidebar { 
            width: 260px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            .mobile-overlay.active { display: block; }
        }

        /* 로그인/로딩 */
        #login-overlay, #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 사용자 정보 및 자산 정보 */
        .user-info-area { padding: 15px 20px 5px 20px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        
        .total-asset-box { padding: 10px 20px 20px 20px; text-align: right; /* 우측 정렬 */ border-bottom: 1px solid #334155; }
        .total-asset-box span { color: #94a3b8; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .total-asset-box div { color: var(--white); font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }

        /* 기존 스타일들 아래에 추가 */
        .cal-day { background: white; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; position: relative; }
        .cal-day:hover { background: #f1f5f9; }
        .cal-day.today { background: #eff6ff; border: 1px solid var(--target); }
        .cal-day.has-profit { font-weight: bold; }
        .cal-day.selected { background: var(--accent) !important; color: white !important; }
        .cal-header { background: #f8fafc; font-weight: bold; padding: 5px 0; text-align: center; font-size: 0.65rem; color: var(--text-light); }
        .cal-profit-dot { color: var(--danger); font-size: 0.6rem; position: absolute; bottom: 2px; }

        /* 리스트 아이템 레이아웃 (3차 우측 정렬) */
        #item-list { flex: 1; overflow-y: auto; }
        .list-item { 
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item); border-left-color: var(--accent); }
        .item-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 4px; }
        .item-info-left { font-size: 0.75rem; color: var(--text-light); }
        .item-info-right { font-size: 0.75rem; color: var(--target); font-weight: bold; }

        /* 메인 콘텐츠 및 카드 */
        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-toggle { display: none; background: var(--white); border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }
        .home-btn { background: var(--white); border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }

        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: #f8fafc; }
        input, textarea { width: 100%; border: none; padding: 4px 0; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        textarea { font-family: inherit; resize: none; font-weight: 400; font-size: 0.9rem; line-height: 1.5; }

        /* 하단 버튼들 */
        .sidebar-footer { padding: 12px; border-top: 1px solid #2d3139; display: flex; flex-direction: column; gap: 8px; }
        .footer-btn { width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; text-align: center; text-decoration: none; box-sizing: border-box; }
        .indicator-btn { background: #334155; color: white; border: none; }
        .logout-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        .history-item { background: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; font-size: 0.85rem; }
        .pagination-ctrl button { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중...</div>
<div id="login-overlay" style="display:none;">
    <div class="login-card">
        <h2>STOCK HUB</h2>
        <input type="email" id="login-email" placeholder="이메일">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
    </div>
</div>

<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMenu()"></div>

<div id="sidebar">
    <div style="padding:20px 20px 10px 20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ 추가</button>
    </div>
    
    <div class="user-info-area" id="user-display-name">환영합니다. 사용자님</div>   
    <div class="total-asset-box">
        <span>총 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    
    <div id="item-list"></div>
    
    <div class="sidebar-footer">
        <a href="https://ko.tradingeconomics.com/commodities" target="_blank" class="footer-btn indicator-btn">📊 원자재 지표 확인</a>
        <button onclick="handleLogout()" class="footer-btn logout-btn">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h2 style="margin:0; font-size:1.1rem; font-weight:900;">Market Dashboard</h2>
        <button class="home-btn" onclick="goHome()">🏠 메인으로</button>
    </div>

    <div id="main-dashboard">
        <div class="card" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div><label style="font-size:0.7rem; opacity:0.7;">평가 합계</label><div id="main-total-stock" style="font-size:1.2rem; font-weight:800;">0원</div></div>
                <div><label style="font-size:0.7rem; opacity:0.7;">예수금</label><div id="main-display-cash" style="font-size:1.2rem; font-weight:800;">0원</div></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">💰 예수금 관리</label>
            <input type="number" id="cash-input" placeholder="금액 입력" oninput="updateCash(this.value)" style="background:#f1f5f9; padding:12px; border-radius:8px;">
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; display:block; margin-bottom:10px;">📈 수익실현 기록</label>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="realized-name" placeholder="종목명" style="background:#f1f5f9; padding:10px; border-radius:8px; flex:1.2;">
                <input type="number" id="realized-price" placeholder="수익금" style="background:#f1f5f9; padding:10px; border-radius:8px; flex:1;">
                <button onclick="addRealizedProfit()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer;">기록</button>
            </div>
            <div id="realized-list"></div>
            <div class="pagination-ctrl" id="realized-pager"></div>
        <div class="card" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <label style="font-size:0.85rem; font-weight:800;">📅 수익 달력 & 월간 통계</label>
            <div style="display: flex; gap: 5px;">
                <select id="cal-year" onchange="initCalendar()" style="border:1px solid #ddd; border-radius:4px; font-size:0.8rem;"></select>
                <select id="cal-month" onchange="initCalendar()" style="border:1px solid #ddd; border-radius:4px; font-size:0.8rem;"></select>
            </div>
        </div>

        <div id="monthly-summary-box" style="background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; border: 1px solid #edf2f7;">
            <div style="text-align: center;">
                <div style="font-size: 0.65rem; color: var(--text-light);">월간 수익 합계</div>
                <div id="month-total-money" style="font-weight: 800; color: var(--text-dark);">0원</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.65rem; color: var(--text-light);">월간 수익률</div>
                <div id="month-total-percent" style="font-weight: 800; color: var(--danger);">0.00%</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px;">
            <div id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #eee; border: 1px solid #eee; border-radius: 8px; overflow: hidden;"></div>
            <div id="daily-detail-panel" style="background: #fff; border: 1px solid #f0f0f0; border-radius: 10px; padding: 10px;">
                <div id="selected-date-label" style="font-size: 0.8rem; font-weight: 800; color: var(--accent); margin-bottom: 10px;">날짜를 선택하세요</div>
                <div id="daily-input-area" style="display: none;">
                    <input type="number" id="daily-profit-input" placeholder="수익금 입력" style="background:#f1f5f9; padding:10px; border-radius:8px; margin-bottom:10px; font-size:0.85rem; width:100%; box-sizing:border-box;">
                    <button onclick="saveDailyProfit()" style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:0.8rem;">수익 저장</button>
                </div>
                <div id="daily-list-display" style="margin-top: 10px; max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>          
    </div>

    <div id="editor" style="display:none;">
        <div style="display:flex; flex-direction:column; margin-bottom:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <input type="text" id="item-title" oninput="updateField('title', this.value)" style="font-size:1.5rem; font-weight:800; width:70%;" placeholder="종목명">
                <button onclick="deleteStock()" style="color:var(--danger); background:#fee2e2; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">삭제</button>
             </div>
             <input type="text" id="item-description" oninput="updateField('description', this.value)" 
                 style="font-size:0.9rem; font-weight:400; color:var(--text-light); margin-top:5px; border-bottom:1px solid #eee;"
                  placeholder="이 주식에 대한 간단한 설명을 입력하세요 (예: 반도체 대장주, 배당주 등)">
         </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">💼 보유 현황</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="price-box"><label style="font-size:0.7rem; color:var(--text-light);">수량</label><input type="number" id="hold-count" oninput="updateField('holdCount', this.value)"></div>
                <div class="price-box"><label style="font-size:0.7rem; color:var(--text-light);">평단가</label><input type="number" id="hold-avg" oninput="updateField('holdAvg', this.value)"></div>
            </div>
            <div style="margin-top:15px; text-align:right;">
                <span id="profit-percent" style="font-size:1.2rem; font-weight:800;">0.00%</span>
                <div id="profit-amount" style="font-size:0.9rem; font-weight:700;">0원</div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">🎯 희망 진입 전략</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                <div class="price-box"><label style="font-size:0.6rem;">1차</label><input type="number" id="target-1" oninput="updateField('target1', this.value)"></div>
                <div class="price-box"><label style="font-size:0.6rem;">2차</label><input type="number" id="target-2" oninput="updateField('target2', this.value)"></div>
                <div class="price-box"><label style="font-size:0.6rem;">3차</label><input type="number" id="target-3" oninput="updateField('target3', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:12px;">📅 종가 기록</label>
            <input type="number" id="manual-close-input" placeholder="금액 입력 후 Enter" onkeydown="handleManualSave(event)" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px;">
            <div id="history-list"></div>
            <div class="pagination-ctrl" id="history-pager"></div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; display:block; margin-bottom:10px;">📝 메모</label>
            <textarea id="field-memo" rows="6" placeholder="자유로운 기록..." oninput="updateField('memo', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d",
        storageBucket: "stock-81b2d.firebasestorage.app",
        messagingSenderId: "180064792232",
        appId: "1:180064792232:web:3a06a244e5a54ad44b5c9d",
        measurementId: "G-788BG78YQL"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], realizedProfits = [], currentId = null, userCash = 0;
    let historyPage = 1, realizedPage = 1;
    const historyLimit = 8, realizedLimit = 10;

    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(err => alert("로그인 실패"));
    }
    function handleLogout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged((user) => {
        // 어떤 에러가 나더라도 로딩 화면은 무조건 숨김
        const loader = document.getElementById('loading-overlay');
        if (loader) loader.style.display = 'none';

        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            const userName = user.email ? user.email.split('@')[0] : "사용자";
            document.getElementById('user-display-name').innerText = `환영합니다. ${userName}님.`;
            initApp();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function initApp() {
        db.ref('stocks').on('value', (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            renderList();
            calculateTotal();
            if(currentId) syncEditor();
        });
        db.ref('user_cash').on('value', (snap) => {
            userCash = Number(snap.val()) || 0;
            const cashInput = document.getElementById('cash-input');
            if(cashInput) cashInput.value = userCash || "";
            calculateTotal();
        });
        db.ref('realized_profits').on('value', (snap) => {
            const data = snap.val();
            realizedProfits = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).reverse() : [];
            renderRealizedList();
        });
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('mobile-overlay').classList.toggle('active');
    }

    function calculateTotal() {
        let totalStockEvaluation = 0;
        items.forEach(item => {
            const count = Number(item.holdCount) || 0;
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            const latestPrice = history.length > 0 ? Number(history[0].price) : (Number(item.holdAvg) || 0);
            totalStockEvaluation += count * latestPrice;
        });
        document.getElementById('main-total-stock').innerText = totalStockEvaluation.toLocaleString() + "원";
        document.getElementById('main-display-cash').innerText = userCash.toLocaleString() + "원";
        const totalAsset = totalStockEvaluation + userCash;
        document.getElementById('total-asset-value').innerText = totalAsset.toLocaleString() + "원";
    }

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `list-item ${currentId === item.id ? 'selected-active' : ''}`;
            div.onclick = () => { 
                currentId = item.id; historyPage = 1;
                document.getElementById('main-dashboard').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                if(window.innerWidth <= 768) toggleMenu();
                syncEditor();
                renderList();
            };
            const avg = Number(item.holdAvg || 0).toLocaleString();
            const t3 = item.target3 ? Number(item.target3).toLocaleString() : '-';
            // 보유 수량 가져오기 (값이 없으면 0으로 표시)
            const count = item.holdCount || 0;
            // 주식 이름 옆에 (수량) 추가
            // 주식 이름 옆에 (수량) 추가
            div.innerHTML = `
                <div style="font-weight:bold;">
                    ${item.title || "새 종목"} 
                    <span style="font-size:0.75rem; color:var(--text-light); font-weight:normal; margin-left:4px;">
                        (${count})
                    </span>
                </div>
                <div class="item-row">
                    <div class="item-info-left">평단: ${avg}</div>
                    <div class="item-info-right">희망가: ${t3}</div>
                </div>`;
            container.appendChild(div);
        });
    }

    function renderRealizedList() {
        const container = document.getElementById('realized-list');
        const pager = document.getElementById('realized-pager');
        if (!container) return;
        container.innerHTML = '';
        const totalPages = Math.ceil(realizedProfits.length / realizedLimit) || 1;
        const paged = realizedProfits.slice((realizedPage-1)*realizedLimit, realizedPage*realizedLimit);
        paged.forEach(p => {
            const priceValue = Number(p.price) || 0;
            const isLoss = priceValue < 0;
            const color = isLoss ? 'var(--target)' : 'var(--danger)';
            const prefix = priceValue > 0 ? '+' : '';
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${p.name || '이름없음'}</span><b style="color:${color}">${prefix}${priceValue.toLocaleString()}원</b><span onclick="deleteRealized('${p.id}')" style="cursor:pointer; opacity:0.3; padding-left:10px;">×</span>`;
            container.appendChild(div);
        });
        if(pager) pager.innerHTML = `<button onclick="realizedPage=Math.max(1, realizedPage-1); renderRealizedList();">이전</button> <span>${realizedPage}/${totalPages}</span> <button onclick="realizedPage=Math.min(${totalPages}, realizedPage+1); renderRealizedList();">다음</button>`;
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;
        const historyArr = item.manualHistory ? Object.entries(item.manualHistory).map(([k, v]) => ({k, ...v})).sort((a,b) => b.ts - a.ts) : [];
        const count = Number(item.holdCount) || 0;
        const avg = Number(item.holdAvg) || 0;
        const latestPrice = historyArr.length > 0 ? Number(historyArr[0].price) : 0;
        const buyRaw = count * avg;
        const buyFee = buyRaw * 0.00015;
        const totalPurchaseCost = buyRaw + buyFee;
        const evalRaw = count * latestPrice;
        const sellFee = evalRaw * 0.00015;
        const sellTax = evalRaw * 0.0020;
        const totalEstimatedReturn = evalRaw - (sellFee + sellTax);
        const diff = totalEstimatedReturn - totalPurchaseCost;
        const percent = totalPurchaseCost > 0 ? (diff / totalPurchaseCost) * 100 : 0;
        const profitAmountEl = document.getElementById('profit-amount');
        const profitPercentEl = document.getElementById('profit-percent');
        let displayDiff = Math.floor(diff).toLocaleString() + "원";
        if (diff > 0) displayDiff = "+" + displayDiff;
        profitAmountEl.innerText = `${displayDiff} (예상정산: ${Math.floor(totalEstimatedReturn).toLocaleString()}원)`;
        profitPercentEl.innerText = `${percent.toFixed(2)}%`;
        if (diff > 1) { profitAmountEl.style.color = 'var(--danger)'; profitPercentEl.style.color = 'var(--danger)'; }
        else if (diff < -1) { profitAmountEl.style.color = 'var(--target)'; profitPercentEl.style.color = 'var(--target)'; }
        else { profitAmountEl.style.color = 'var(--text-dark)'; profitPercentEl.style.color = 'var(--text-dark)'; }
        document.getElementById('item-title').value = item.title || "";
        document.getElementById('item-description').value = item.description || ""; 
        document.getElementById('hold-count').value = item.holdCount || "";
        document.getElementById('hold-avg').value = item.holdAvg || "";
        document.getElementById('target-1').value = item.target1 || "";
        document.getElementById('target-2').value = item.target2 || "";
        document.getElementById('target-3').value = item.target3 || "";
        document.getElementById('field-memo').value = item.memo || "";
        renderHistory(historyArr);
    }

    function renderHistory(arr) {
        const hList = document.getElementById('history-list');
        const pager = document.getElementById('history-pager');
        hList.innerHTML = '';
        const totalPages = Math.ceil(arr.length / historyLimit) || 1;
        const paged = arr.slice((historyPage-1)*historyLimit, historyPage*historyLimit);
        paged.forEach(h => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${h.date}</span> <b>${h.price.toLocaleString()}원</b> <span onclick="deleteHistory('${h.k}')" style="cursor:pointer; opacity:0.2;">×</span>`;
            hList.appendChild(div);
        });
        pager.innerHTML = `<button onclick="historyPage=Math.max(1, historyPage-1); syncEditor();">이전</button> <span>${historyPage}/${totalPages}</span> <button onclick="historyPage=Math.min(${totalPages}, historyPage+1); syncEditor();">다음</button>`;
    }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value && currentId) {
            const now = new Date();
            const dateStr = `${String(now.getFullYear()).slice(-2)}.${now.getMonth()+1}.${now.getDate()}`;
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: Number(e.target.value), ts: Date.now() });
            e.target.value = '';
        }
    }
    function updateField(f, v) { if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); }
    function updateCash(v) { db.ref('user_cash').set(Number(v)); }
    function deleteHistory(k) { if(confirm("삭제?")) db.ref(`stocks/${currentId}/manualHistory/${k}`).remove(); }
    function deleteRealized(id) { if(confirm("기록 삭제?")) db.ref(`realized_profits/${id}`).remove(); }
    function deleteStock() { if(confirm("종목을 삭제하시겠습니까?")) { db.ref(`stocks/${currentId}`).remove(); goHome(); } }
    function addNewItem() { db.ref('stocks').push({ title: "새 종목", holdCount: 0, holdAvg: 0 }); }
    function goHome() { currentId = null; document.getElementById('editor').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'block'; renderList(); }
    function addRealizedProfit() {
        const name = document.getElementById('realized-name').value;
        const price = document.getElementById('realized-price').value;
        if(!name || price === "") return;
        db.ref('realized_profits').push({ name, price: Number(price), date: new Date().toLocaleDateString(), ts: Date.now() });
        document.getElementById('realized-name').value = '';
        document.getElementById('realized-price').value = '';
    }
    // 스크립트 가장 하단부
let selectedDateStr = "";

function initCalendar() {
    const yearSelect = document.getElementById('cal-year');
    const monthSelect = document.getElementById('cal-month');
    if (yearSelect.innerHTML === "") {
        for (let y = 2024; y <= 2050; y++) { // 2050년까지 확장
            const opt = document.createElement('option');
            opt.value = y; opt.innerText = y + "년";
            yearSelect.appendChild(opt);
        }
        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m; opt.innerText = m + "월";
            monthSelect.appendChild(opt);
        }
        const now = new Date();
        yearSelect.value = now.getFullYear();
        monthSelect.value = now.getMonth() + 1;
    }
    renderCalendar(Number(yearSelect.value), Number(monthSelect.value));
}

function renderCalendar(year, month) {
    const grid = document.getElementById('calendar-grid');
    if(!grid) return;
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => {
        const div = document.createElement('div');
        div.className = 'cal-header';
        div.innerText = d;
        grid.appendChild(div);
    });
    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    for (let d = 1; d <= lastDate; d++) {
        const dateStr = `${year}. ${month}. ${d}.`;
        const dayDiv = document.createElement('div');
        dayDiv.className = 'cal-day';
        if (selectedDateStr === dateStr) dayDiv.classList.add('selected');
        const dailyProfits = realizedProfits.filter(p => p.date === dateStr);
        const dailySum = dailyProfits.reduce((sum, p) => sum + Number(p.price), 0);
        dayDiv.innerHTML = `<span>${d}</span>`;
        if (dailySum !== 0) {
            dayDiv.classList.add('has-profit');
            const dot = document.createElement('div');
            dot.className = 'cal-profit-dot';
            dot.innerText = dailySum > 0 ? '●' : '○';
            dayDiv.appendChild(dot);
        }
        dayDiv.onclick = () => selectCalendarDate(dateStr);
        grid.appendChild(dayDiv);
    }
    updateMonthlyStats(year, month);
}

function updateMonthlyStats(year, month) {
    const currentMonthPrefix = `${year}. ${month}.`;
    const monthProfits = realizedProfits.filter(p => p.date.startsWith(currentMonthPrefix));
    const totalProfit = monthProfits.reduce((sum, p) => sum + Number(p.price), 0);
    
    // 현재 표시된 총 자산 텍스트에서 숫자만 추출
    const totalAssetElem = document.getElementById('main-total-stock');
    const totalAsset = totalAssetElem ? Number(totalAssetElem.innerText.replace(/[^0-9.-]/g, '')) : 0;
    
    const yieldPercent = totalAsset > 0 ? (totalProfit / totalAsset) * 100 : 0;

    document.getElementById('month-total-money').innerText = totalProfit.toLocaleString() + "원";
    document.getElementById('month-total-percent').innerText = yieldPercent.toFixed(2) + "%";
    document.getElementById('month-total-percent').style.color = totalProfit >= 0 ? 'var(--danger)' : 'var(--target)';
}

function selectCalendarDate(dateStr) {
    selectedDateStr = dateStr;
    document.getElementById('selected-date-label').innerText = dateStr;
    document.getElementById('daily-input-area').style.display = 'block';
    const listDisplay = document.getElementById('daily-list-display');
    const dailyData = realizedProfits.filter(p => p.date === dateStr);
    listDisplay.innerHTML = dailyData.map(p => `
        <div style="font-size:0.75rem; display:flex; justify-content:space-between; margin-bottom:4px; border-bottom:1px dashed #eee; padding-bottom:2px;">
            <span>${p.name}</span>
            <b style="color:${p.price >= 0 ? 'var(--danger)' : 'var(--target)'}">${Number(p.price).toLocaleString()}원</b>
        </div>
    `).join('') || '<div style="font-size:0.7rem; color:#ccc;">기록 없음</div>';
    initCalendar(); 
}

function saveDailyProfit() {
    const price = document.getElementById('daily-profit-input').value;
    if (price === "" || !selectedDateStr) return;
    db.ref('realized_profits').push({
        name: "일일수익",
        price: Number(price),
        date: selectedDateStr,
        ts: Date.now()
    }).then(() => {
        document.getElementById('daily-profit-input').value = '';
        selectCalendarDate(selectedDateStr);
    });
}

// [중요] 기존 initApp 함수를 찾아서 맨 마지막 줄에 initCalendar(); 를 추가하세요.
function initApp() {
    // ... 기존 코드들 ...
    initCalendar(); // 이 줄을 꼭 추가해야 달력이 나타납니다.
}
