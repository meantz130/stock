<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #10b981;
            --target: #3b82f6;
            --entry: #f59e0b;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        /* 로그인 및 로딩 레이어 */
        #login-overlay, #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sidebar-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        #loading-overlay { z-index: 10000; color: white; font-weight: bold; font-size: 1.2rem; }
        
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        #sidebar { 
            width: 260px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar.open + .mobile-overlay { display: block; }
        }

        .user-welcome { padding: 15px 20px 5px 20px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }

        .total-asset-box {
            padding: 5px 20px 15px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #2d3139;
            text-align: right;
        }
        .total-asset-box span { color: var(--text-light); font-size: 0.7rem; display: block; margin-bottom: 2px; }
        .total-asset-box div { color: var(--white); font-weight: 800; font-size: 1.1rem; }

        #item-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #374151 transparent; }
        #item-list::-webkit-scrollbar { width: 4px; }
        #item-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .list-item { 
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item) !important; border-left-color: var(--accent); }

        .sidebar-footer { padding: 12px; background: #1a1c23; border-top: 1px solid #2d3139; display: flex; flex-direction: column; gap: 8px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 10px 0; background: #2d3139; color: white;
            text-decoration: none; border-radius: 8px; font-size: 0.85rem;
            font-weight: 600; transition: var(--transition); box-sizing: border-box;
        }
        .logout-btn {
            width: 100%; padding: 10px 0; background: transparent; 
            color: var(--danger); border: 1px solid var(--danger);
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); box-sizing: border-box;
        }

        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* 홈 버튼 스타일 */
        .home-btn {
            background: var(--white); border: 1px solid #e2e8f0; padding: 8px 12px;
            border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 6px; color: var(--text-dark);
        }
        .home-btn:hover { background: #f8fafc; }

        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid #f0f0f0; }
        
        /* 메인 수익실현 UI */
        #main-dashboard { max-width: 800px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .profit-board { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .profit-board h3 { margin: 0; font-size: 0.9rem; opacity: 0.9; }
        .profit-board .amount { font-size: 2.2rem; font-weight: 900; margin: 10px 0; }
        
        .realized-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .realized-input-group input { flex: 1; background: #f1f5f9; border-radius: 8px; padding: 12px; font-weight: 400; }
        .realized-input-group button { background: var(--sidebar-bg); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .editor-container { max-width: 800px; margin: 0 auto; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { width: 100%; border: none; padding: 4px 0; font-size: 0.95rem; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        textarea { font-weight: 400; line-height: 1.5; font-size: 0.9rem; }
        
        .history-item { background: #f1f5f9; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .profit-pos { color: var(--danger); }
        .profit-neg { color: var(--target); }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중입니다...</div>

<div id="login-overlay" style="display:none;">
    <div class="login-card">
        <h2 style="color:var(--text-dark); margin-bottom:20px;">STOCK HUB</h2>
        <input type="email" id="login-email" placeholder="아이디 (이메일)">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
    </div>
</div>

<div id="sidebar">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ 추가</button>
    </div>
    <div class="user-welcome" id="user-display-name">사용자님</div>
    <div class="total-asset-box">
        <span>총 보유 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    <div id="item-list"></div>
    <div class="sidebar-footer">
        <button onclick="handleLogout()" class="logout-btn">로그아웃</button>
    </div>
</div>

<div id="main-content">
    <div class="top-bar">
        <h2 id="view-title" style="margin:0; font-size:1.2rem; font-weight:900; color:var(--text-dark);">Market Dashboard</h2>
        <button class="home-btn" onclick="goHome()">🏠 메인으로</button>
    </div>

    <div id="main-dashboard">
        <div class="profit-board">
            <h3>누적 실현 손익</h3>
            <div class="amount" id="total-realized-display">0원</div>
            <p style="font-size: 0.75rem; margin:0; opacity: 0.8;">* 확정된 매도 수익의 합계입니다.</p>
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">📝 수익실현 기록하기</label>
            <div class="realized-input-group">
                <input type="text" id="realized-title" placeholder="종목명 또는 내용">
                <input type="number" id="realized-amount" placeholder="금액 (원)">
                <button onclick="saveRealizedRecord()">기록</button>
            </div>
            <div id="realized-history-list" style="margin-top:20px;">
                </div>
        </div>
    </div>

    <div class="editor-container" id="editor">
        <div class="editor-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <input type="text" id="item-title" placeholder="종목명" oninput="updateField('title', this.value)" style="font-size:1.5rem; font-weight:800;">
            <button onclick="deleteStock()" style="color:var(--danger); background:#fee2e2; border:none; padding:8px 14px; border-radius:8px; font-weight:bold; cursor:pointer;">삭제</button>
        </div>
        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">💼 실시간 포지션</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <input type="number" id="hold-count" placeholder="수량" oninput="updateField('holdCount', this.value)" style="background:#f8fafc; padding:10px; border-radius:8px;">
                <input type="number" id="hold-avg" placeholder="평단" oninput="updateField('holdAvg', this.value)" style="background:#f8fafc; padding:10px; border-radius:8px;">
            </div>
        </div>
        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:10px; display:block;">📝 분석 메모</label>
            <textarea id="field-memo" rows="6" oninput="updateField('memo', this.value)" style="background:#f8fafc; padding:10px; border-radius:8px; width:97%"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], currentId = null;

    auth.onAuthStateChanged((user) => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            initApp();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function initApp() {
        // 종목 데이터 감시
        db.ref('stocks').on('value', (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            calculateTotalAssets();
            renderList();
        });

        // 수익실현 데이터 감시
        db.ref('realized_profits').on('value', (snap) => {
            renderRealizedHistory(snap.val());
        });
    }

    // 메인으로 가기 기능
    function goHome() {
        currentId = null;
        document.getElementById('view-title').innerText = "Market Dashboard";
        document.getElementById('editor').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
    }

    // 수익실현 저장
    function saveRealizedRecord() {
        const title = document.getElementById('realized-title').value;
        const amount = document.getElementById('realized-amount').value;
        if(!title || !amount) return alert("내용과 금액을 입력하세요.");

        db.ref('realized_profits').push({
            title: title,
            amount: Number(amount),
            date: new Date().toLocaleDateString(),
            ts: Date.now()
        });

        document.getElementById('realized-title').value = '';
        document.getElementById('realized-amount').value = '';
    }

    // 수익실현 내역 렌더링
    function renderRealizedHistory(data) {
        const list = document.getElementById('realized-history-list');
        const display = document.getElementById('total-realized-display');
        list.innerHTML = '';
        let total = 0;

        if(data) {
            Object.entries(data).reverse().forEach(([key, val]) => {
                total += val.amount;
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div><strong>${val.title}</strong> <small style="color:#9ca3af; margin-left:8px;">${val.date}</small></div>
                    <div style="font-weight:800; color:${val.amount >=0 ? 'var(--danger)' : 'var(--target)'}">
                        ${val.amount >= 0 ? '+' : ''}${val.amount.toLocaleString()}원
                        <span style="margin-left:10px; cursor:pointer; color:#ccc;" onclick="deleteRealized('${key}')">×</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        display.innerText = total.toLocaleString() + "원";
    }

    function deleteRealized(key) { if(confirm("삭제하시겠습니까?")) db.ref(`realized_profits/${key}`).remove(); }

    // 기존 종목 관리 로직
    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `list-item ${currentId === item.id ? 'selected-active' : ''}`;
            div.style.cssText = "padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; color: #fff;";
            div.innerHTML = `<strong>${item.title || "새 종목"}</strong>`;
            div.onclick = () => {
                currentId = item.id;
                document.getElementById('view-title').innerText = "Stock Analysis";
                document.getElementById('main-dashboard').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                syncEditor();
            };
            container.appendChild(div);
        });
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;
        document.getElementById('item-title').value = item.title || "";
        document.getElementById('hold-count').value = item.holdCount || "";
        document.getElementById('hold-avg').value = item.holdAvg || "";
        document.getElementById('field-memo').value = item.memo || "";
    }

    function updateField(f, v) { if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); }
    function calculateTotalAssets() {
        let total = 0;
        items.forEach(item => { total += (Number(item.holdCount) || 0) * (Number(item.holdAvg) || 0); });
        document.getElementById('total-asset-value').innerText = total.toLocaleString() + "원";
    }
    function deleteStock() { if(confirm("삭제하시겠습니까?")) { db.ref(`stocks/${currentId}`).remove(); goHome(); } }
    function addNewItem() { const ref = db.ref('stocks').push(); ref.set({ title: "새 종목", holdCount: 0, holdAvg: 0 }); }
    function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pw').value); }
    function handleLogout() { if(confirm("로그아웃?")) auth.signOut().then(()=>location.reload()); }
</script>
</body>
</html>
