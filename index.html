<div class="card">
            <label style="font-size: 0.75rem; font-weight: 800; color: var(--text-dark); margin-bottom: 12px; display: block;">🎯 희망 진입 전략</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <div class="price-box">
                    <label>1차 희망가</label>
                    <input type="number" id="target-price-1" placeholder="입력" oninput="updateField('targetPrice1', this.value)">
                </div>
                <div class="price-box">
                    <label>2차 희망가</label>
                    <input type="number" id="target-price-2" placeholder="입력" oninput="updateField('targetPrice2', this.value)">
                </div>
                <div class="price-box">
                    <label>3차 희망가</label>
                    <input type="number" id="target-price-3" placeholder="입력" oninput="updateField('targetPrice3', this.value)">
                </div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">📅 종가 히스토리</label>
            <input type="number" id="manual-close-input" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px; font-size:0.9rem;" placeholder="금액 입력 + Enter" onkeydown="handleManualSave(event)">
<script>
    // ... 스크립트 상단 동일 ...

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;

        const historyArr = item.manualHistory ? Object.entries(item.manualHistory).map(([k, v]) => ({k, ...v})).sort((a,b) => b.ts - a.ts) : [];
        const latestPrice = historyArr.length > 0 ? historyArr[0].price : 0;
        const count = Number(item.holdCount) || 0, avg = Number(item.holdAvg) || 0;
        
        const evalAmt = count * (latestPrice || avg);
        const buyAmt = count * avg;
        const diff = evalAmt - buyAmt;
        const percent = buyAmt > 0 ? (diff / buyAmt) * 100 : 0;

        document.getElementById('item-asset-sum').innerText = evalAmt.toLocaleString();
        document.getElementById('profit-amount').innerText = `${diff >= 0 ? '+' : ''}${diff.toLocaleString()}원`;
        document.getElementById('profit-amount').style.color = diff >= 0 ? 'var(--danger)' : 'var(--target)';
        document.getElementById('profit-percent').innerText = `${percent >= 0 ? '+' : ''}${percent.toFixed(2)}%`;
        document.getElementById('profit-percent').style.color = percent >= 0 ? 'var(--danger)' : 'var(--target)';

        // 입력 필드 동기화 (희망 진입가 포함)
        const fields = {
            'item-title': item.title, 
            'hold-count': item.holdCount, 
            'hold-avg': item.holdAvg, 
            'field-memo': item.memo,
            'target-price-1': item.targetPrice1,
            'target-price-2': item.targetPrice2,
            'target-price-3': item.targetPrice3
        };
        
        Object.entries(fields).forEach(([id, val]) => { 
            if(document.activeElement.id !== id) document.getElementById(id).value = val || ""; 
        });
        renderHistory(historyArr);
    }

    // ... 나머지 함수들 동일 ...
</script>
