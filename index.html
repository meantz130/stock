<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #10b981;
            --target: #3b82f6;
            --entry: #f59e0b;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #374151;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        /* 사이드바 및 모바일 대응 */
        #sidebar { 
            width: 280px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar.open + .mobile-overlay { display: block; }
        }

        .list-item { 
            padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item.active { background: var(--active-item); border-left: 4px solid var(--accent); }

        /* 메인 영역 */
        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .menu-btn { display: none; background: var(--sidebar-bg); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        
        @media (max-width: 768px) { .menu-btn { display: block; } }

        /* 지표 대시보드 (모바일 2열) */
        .market-dashboard { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
            margin-bottom: 20px; max-width: 1000px;
        }
        @media (min-width: 1024px) { .market-dashboard { grid-template-columns: repeat(4, 1fr); } }

        .market-card { background: var(--sidebar-bg); color: white; padding: 12px; border-radius: 12px; text-align: center; }
        .market-val { font-size: 1.1rem; font-weight: bold; display: block; margin: 4px 0; }
        .up { color: #ff4d4d; } .down { color: #4d94ff; }

        /* 카드 및 편집기 */
        .editor-container { max-width: 800px; margin: 0 auto; display: none; }
        .card { background: var(--white); padding: 18px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        .price-section { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .price-section { grid-template-columns: 1fr 1fr; } }

        .price-box { border: 1px solid #edf2f7; padding: 12px; border-radius: 12px; background: #fafafa; }
        
        input, textarea { 
            width: 100%; border: none; border-bottom: 2px solid #eee; padding: 8px 0; 
            font-size: 1rem; outline: none; background: transparent;
        }
        input:focus, textarea:focus { border-bottom-color: var(--accent); }
        textarea { resize: none; font-family: inherit; }

        .action-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .history-item { background: #f1f5f9; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:20px; font-weight:900; font-size:1.2rem; border-bottom:1px solid #2d3139; display:flex; justify-content:space-between; align-items:center;">
        <span>STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;">+ 추가</button>
    </div>
    <div id="item-list"></div>
</div>
<div class="mobile-overlay" onclick="toggleMenu()"></div>

<div id="main-content">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰ 메뉴</button>
        <h2 style="margin:0; font-size:1.2rem;">Market Overview</h2>
    </div>

    <div class="market-dashboard">
        <div class="market-card">
            <span style="font-size:0.7rem; color:var(--text-light)">KOSPI</span>
            <span id="idx-kospi" class="market-val">---</span>
            <button onclick="updateIndex('kospi')" style="font-size:0.6rem; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:4px; padding:2px 6px;">Check</button>
        </div>
        <div class="market-card">
            <span style="font-size:0.7rem; color:var(--text-light)">NASDAQ</span>
            <span id="idx-nasdaq" class="market-val">---</span>
            <button onclick="updateIndex('nasdaq')" style="font-size:0.6rem; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:4px; padding:2px 6px;">Check</button>
        </div>
        <div class="market-card">
            <span style="font-size:0.7rem; color:var(--text-light)">S&P 500</span>
            <span id="idx-snp" class="market-val">---</span>
            <button onclick="updateIndex('snp')" style="font-size:0.6rem; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:4px; padding:2px 6px;">Check</button>
        </div>
        <div class="market-card">
            <span style="font-size:0.7rem; color:var(--text-light)">USD/KRW</span>
            <span id="idx-usd" class="market-val">---</span>
            <button onclick="updateIndex('usd')" style="font-size:0.6rem; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:4px; padding:2px 6px;">Check</button>
        </div>
    </div>

    <div id="placeholder" style="text-align: center; margin-top: 10vh; color: #cbd5e1;">
        <p style="font-size:3rem;">📈</p>
        <p>종목을 선택해 주세요.</p>
    </div>

    <div class="editor-container" id="editor">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <input type="text" id="item-title" style="font-size:1.5rem; font-weight:900;" oninput="updateField('title', this.value)">
            <button onclick="deleteStock()" style="color:var(--danger); border:none; background:none; font-weight:bold; cursor:pointer;">삭제</button>
        </div>

        <div class="card">
            <div class="price-section">
                <div class="price-box">
                    <label style="font-size:0.75rem; color:var(--entry); font-weight:bold;">🎯 희망 진입가</label>
                    <input type="number" id="entry-price" oninput="updateField('entryPrice', this.value)">
                    <div id="profit-tag" style="margin-top:10px; font-weight:bold; font-size:0.9rem;"></div>
                </div>
                <div class="price-box">
                    <label style="font-size:0.75rem; color:var(--accent); font-weight:bold;">📢 현재가 확인</label>
                    <span id="current-price-view" style="font-size:1.2rem; font-weight:bold; display:block; margin:5px 0;">0 원</span>
                    <button class="action-btn" style="margin-top:5px; padding:8px;" onclick="fetchLivePrice()">업데이트</button>
                </div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:bold; color:var(--text-light);">📝 종목 메모</label>
            <textarea id="field-memo" rows="3" placeholder="매매 전략이나 뉴스 메모..." oninput="updateField('memo', this.value)"></textarea>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:bold; color:var(--text-light);">📅 수동 종가 기록 (Enter)</label>
            <input type="number" id="manual-close-input" onkeydown="handleManualSave(event)">
            <div id="history-list" style="margin-top:12px;"></div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:bold; color:var(--text-light);">🚀 목표가</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <input type="number" id="t1" placeholder="1차" oninput="updateField('t1', this.value)">
                <input type="number" id="t2" placeholder="2차" oninput="updateField('t2', this.value)">
                <input type="number" id="t3" placeholder="3차" oninput="updateField('t3', this.value)">
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let items = [], currentId = null;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function updateIndex(type) {
        const data = {
            kospi: ["2,752.12", "+1.2%"], nasdaq: ["16,340", "-0.8%"],
            snp: ["5,204", "+0.1%"], usd: ["1,345", "+0.4%"]
        };
        document.getElementById(`idx-${type}`).innerText = data[type][0];
    }

    function fetchLivePrice() {
        if(!currentId) return;
        const livePrice = Math.floor(Math.random() * 50000) + 30000;
        document.getElementById('current-price-view').innerText = livePrice.toLocaleString() + " 원";
        const entry = document.getElementById('entry-price').value;
        if(entry > 0) {
            const rate = ((livePrice - entry) / entry * 100).toFixed(2);
            document.getElementById('profit-tag').innerHTML = `수익률: <span style="color:${rate >= 0 ? 'var(--danger)' : 'var(--target)'}">${rate}%</span>`;
        }
    }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value) {
            const now = new Date();
            const dateStr = `${now.getFullYear().toString().slice(-2)}.${now.getMonth()+1}.${now.getDate()}`;
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: e.target.value });
            e.target.value = '';
        }
    }

    db.ref('stocks').on('value', (snap) => {
        const data = snap.val();
        items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b)=>b.timestamp-a.timestamp) : [];
        renderList();
        if(currentId) syncEditor();
    });

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `list-item ${item.id === currentId ? 'active' : ''}`;
            div.onclick = () => { currentId = item.id; selectItem(); if(window.innerWidth <= 768) toggleMenu(); };
            div.innerHTML = `<strong>${item.title || "무제"}</strong><br><small>${Number(item.entryPrice).toLocaleString()}원</small>`;
            container.appendChild(div);
        });
    }

    function selectItem() {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        syncEditor();
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;
        document.getElementById('item-title').value = item.title || "";
        document.getElementById('entry-price').value = item.entryPrice || "";
        document.getElementById('field-memo').value = item.memo || "";
        document.getElementById('t1').value = item.t1 || "";
        document.getElementById('t2').value = item.t2 || "";
        document.getElementById('t3').value = item.t3 || "";

        const hList = document.getElementById('history-list');
        hList.innerHTML = '';
        if(item.manualHistory) {
            Object.entries(item.manualHistory).reverse().slice(0, 5).forEach(([key, val]) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${val.date}</span> <b>${Number(val.price).toLocaleString()}원</b> <span style="color:var(--danger); cursor:pointer;" onclick="deleteHistory('${key}')">×</span>`;
                hList.appendChild(div);
            });
        }
    }

    function updateField(f, v) { db.ref(`stocks/${currentId}`).update({ [f]: v, timestamp: Date.now() }); }
    function deleteHistory(key) { db.ref(`stocks/${currentId}/manualHistory/${key}`).remove(); }
    function deleteStock() { if(confirm("삭제할까요?")) { db.ref(`stocks/${currentId}`).remove(); currentId = null; location.reload(); } }
    function addNewItem() {
        const ref = db.ref('stocks').push();
        ref.set({ title: "새 종목", entryPrice: 0, timestamp: Date.now() });
        currentId = ref.key;
    }
</script>
</body>
</html>
