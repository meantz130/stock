<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #10b981;
            --target: #3b82f6;
            --entry: #f59e0b;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        /* 로그인 및 로딩 레이어 */
        #login-overlay, #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sidebar-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        #loading-overlay { z-index: 10000; color: white; font-weight: bold; font-size: 1.2rem; }
        
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        #sidebar { 
            width: 260px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar.open + .mobile-overlay { display: block; }
        }

        .user-welcome { padding: 15px 20px 5px 20px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }

        .total-asset-box {
            padding: 5px 20px 15px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #2d3139;
            text-align: right;
        }
        .total-asset-box span { color: var(--text-light); font-size: 0.7rem; display: block; margin-bottom: 2px; }
        .total-asset-box div { color: var(--white); font-weight: 800; font-size: 1.1rem; }

        #item-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #374151 transparent; }
        #item-list::-webkit-scrollbar { width: 4px; }
        #item-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .list-item { 
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { background: var(--active-item) !important; border-left-color: var(--accent); }
        .list-item strong { display: block; margin-bottom: 3px; font-size: 0.95rem; }
        .list-item .info-row { display: flex; justify-content: space-between; align-items: center; }
        .list-item small { color: var(--text-light); font-size: 0.7rem; }
        .list-item .target-tag { font-size: 0.65rem; color: var(--entry); border: 1px solid var(--entry); padding: 0px 4px; border-radius: 3px; }

        .sidebar-footer { padding: 12px; background: #1a1c23; border-top: 1px solid #2d3139; display: flex; flex-direction: column; gap: 8px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 10px 0; background: #2d3139; color: white;
            text-decoration: none; border-radius: 8px; font-size: 0.85rem;
            font-weight: 600; transition: var(--transition); box-sizing: border-box;
        }
        .logout-btn {
            width: 100%; padding: 10px 0; background: transparent; 
            color: var(--danger); border: 1px solid var(--danger);
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: var(--transition); box-sizing: border-box;
        }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); }

        #main-content { flex: 1; padding: 15px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .menu-btn { display: none; background: var(--sidebar-bg); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        @media (max-width: 768px) { .menu-btn { display: block; } }

        /* 메인 홈 버튼 */
        .home-btn {
            background: var(--white); border: 1px solid #e2e8f0; padding: 8px 15px;
            border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 6px; color: var(--text-dark);
            transition: var(--transition);
        }
        .home-btn:hover { background: #f8fafc; border-color: var(--accent); }

        .editor-container { max-width: 800px; margin: 0 auto; display: none; animation: fadeIn 0.3s ease; }
        
        /* 메인 대시보드 스타일 */
        #main-dashboard { max-width: 800px; margin: 0 auto; display: block; animation: fadeIn 0.3s ease; }
        .summary-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            color: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .summary-item label { font-size: 0.75rem; opacity: 0.7; display: block; margin-bottom: 5px; }
        .summary-item div { font-size: 1.4rem; font-weight: 800; }

        .realized-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .realized-input-group input { flex: 1; background: #f1f5f9; border-radius: 8px; padding: 12px; font-weight: 400; border: 1px solid #e2e8f0; }
        .realized-input-group button { background: var(--sidebar-bg); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .price-box { border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 10px; background: #f8fafc; }
        .price-box label { font-size: 0.7rem; font-weight: bold; color: var(--text-light); margin-bottom: 3px; display: block; }
        
        input, textarea { width: 100%; border: none; padding: 4px 0; font-size: 0.95rem; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        textarea { font-weight: 400; line-height: 1.5; font-size: 0.9rem; }
        
        .history-item { background: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
        .profit-pos { color: var(--danger); }
        .profit-neg { color: var(--target); }
    </style>
</head>
<body>

<div id="loading-overlay">로딩중입니다...</div>

<div id="login-overlay" style="display:none;">
    <div class="login-card">
        <h2 style="color:var(--text-dark); margin-bottom:20px;">STOCK HUB LOGIN</h2>
        <input type="email" id="login-email" placeholder="아이디 (이메일)">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
        <p id="login-error" style="color:var(--danger); font-size:0.8rem; margin-top:10px; display:none;">아이디 또는 비밀번호를 확인해주세요.</p>
    </div>
</div>

<div id="sidebar">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="goHome()">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ 추가</button>
    </div>
    
    <div class="user-welcome" id="user-display-name">환영합니다. 사용자님</div>
    <div class="total-asset-box">
        <span>총 보유 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>

    <div id="item-list"></div>
    <div class="sidebar-footer">
        <a href="https://ko.tradingeconomics.com/" target="_blank" class="link-btn">📊 지표 확인</a>
        <button onclick="handleLogout()" class="logout-btn">로그아웃</button>
    </div>
</div>
<div class="mobile-overlay" onclick="toggleMenu()"></div>

<div id="main-content">
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-btn" onclick="toggleMenu()">☰ 메뉴</button>
            <h2 id="view-title" style="margin:0; font-size:1.2rem; font-weight:900; color:var(--text-dark);">Market Intelligence</h2>
        </div>
        <button class="home-btn" onclick="goHome()">🏠 메인 대시보드</button>
    </div>

    <div id="main-dashboard">
        <div class="summary-card">
            <h3 style="margin:0; font-size:1rem; opacity:0.8;">Asset Summary</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <label>총 실현 손익</label>
                    <div id="main-total-realized">0원</div>
                </div>
                <div class="summary-item">
                    <label>총 평가 자산</label>
                    <div id="main-total-asset">0원</div>
                </div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.8rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">💰 수익실현(매도) 기록</label>
            <div class="realized-input-group">
                <input type="text" id="realized-name" placeholder="종목명">
                <input type="number" id="realized-val" placeholder="수익금(원)">
                <button onclick="addRealizedRecord()">기록</button>
            </div>
            <div id="realized-history-container" style="margin-top:15px;">
                </div>
        </div>
    </div>

    <div class="editor-container" id="editor">
        <div class="editor-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; gap:15px;">
            <input type="text" id="item-title" placeholder="종목명" oninput="updateField('title', this.value)" style="flex:1; font-size:1.5rem; font-weight:800; border:none; color:var(--text-dark);">
            <button style="color:var(--danger); background:#fee2e2; border:none; padding:8px 14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:0.8rem;" onclick="deleteStock()">삭제</button>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">💼 실시간 포지션 (최신 종가 기준)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
                <div class="price-box"><label>보유 수량</label><input type="number" id="hold-count" oninput="updateField('holdCount', this.value)"></div>
                <div class="price-box"><label>평균 단가</label><input type="number" id="hold-avg" oninput="updateField('holdAvg', this.value)"></div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f0f0f0; padding-top:12px;">
                <div style="font-size:0.8rem; color:var(--text-light);">수익 현황</div>
                <div style="text-align:right; display:flex; align-items:center; gap:10px;">
                    <div id="profit-amount" style="font-size:0.85rem; font-weight:700;">0원</div>
                    <div id="profit-percent" style="font-size:1.1rem; font-weight:800;">0.00%</div>
                </div>
            </div>
            <div style="margin-top:10px; text-align:right; font-weight:800; font-size:0.9rem; color: var(--text-dark);">
                평가액: <span id="item-asset-sum" style="color:var(--accent);">0</span>원
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">🚀 예상 매수 지점</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <div class="price-box"><label>1차</label><input type="number" id="t1" oninput="updateField('t1', this.value)"></div>
                <div class="price-box"><label>2차</label><input type="number" id="t2" oninput="updateField('t2', this.value)"></div>
                <div class="price-box"><label>3차</label><input type="number" id="t3" oninput="updateField('t3', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:12px; display:block;">📅 종가 히스토리</label>
            <input type="number" id="manual-close-input" style="border-bottom:2px solid #f1f5f9; margin-bottom:10px; font-size:0.9rem;" placeholder="금액 입력 + Enter" onkeydown="handleManualSave(event)">
            <div id="history-list"></div>
            <div class="pagination-ctrl" id="history-pager"></div>
        </div>

        <div class="card">
            <label style="font-size:0.75rem; font-weight:800; color:var(--text-dark); margin-bottom:10px; display:block;">📝 메모</label>
            <textarea id="field-memo" rows="4" oninput="updateField('memo', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let items = [], currentId = null, lastClickedId = null;
    let historyPage = 1; const historyLimit = 10;

    // --- 인증 관련 (기존 유지) ---
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pw = document.getElementById('login-pw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(() => { document.getElementById('login-error').style.display = 'block'; });
    }
    function handleLogout() { if(confirm("로그아웃 하시겠습니까?")) auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged((user) => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-display-name').innerText = `환영합니다. ${user.email.split('@')[0]}님`;
            initApp();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    // --- 메인 홈 이동 로직 ---
    function goHome() {
        currentId = null;
        lastClickedId = null;
        document.getElementById('view-title').innerText = "Market Intelligence";
        document.getElementById('editor').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        renderList();
    }

    // --- 수익실현 기록 로직 ---
    function addRealizedRecord() {
        const name = document.getElementById('realized-name').value;
        const val = document.getElementById('realized-val').value;
        if(!name || !val) return;
        db.ref('realized_profits').push({ name, amount: Number(val), date: new Date().toLocaleDateString(), ts: Date.now() });
        document.getElementById('realized-name').value = '';
        document.getElementById('realized-val').value = '';
    }

    function renderRealized(data) {
        const container = document.getElementById('realized-history-container');
        const displayTotal = document.getElementById('main-total-realized');
        container.innerHTML = '';
        let total = 0;
        if(data) {
            Object.entries(data).reverse().forEach(([key, val]) => {
                total += val.amount;
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div><strong>${val.name}</strong> <small style="margin-left:5px; color:#94a3b8;">${val.date}</small></div>
                    <div style="font-weight:bold; color:${val.amount >=0 ? 'var(--danger)' : 'var(--target)'}">
                        ${val.amount >=0 ? '+' : ''}${val.amount.toLocaleString()}원
                        <span style="margin-left:10px; cursor:pointer; color:#ccc;" onclick="deleteRealized('${key}')">×</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        displayTotal.innerText = total.toLocaleString() + "원";
    }
    function deleteRealized(key) { if(confirm("삭제할까요?")) db.ref(`realized_profits/${key}`).remove(); }

    // --- 기존 앱 메인 로직 ---
    function initApp() {
        db.ref('stocks').on('value', (snap) => {
            const data = snap.val();
            items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
            calculateTotalAssets();
            renderList();
            if(currentId) syncEditor();
        });
        db.ref('realized_profits').on('value', (snap) => { renderRealized(snap.val()); });
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value && currentId) {
            const dateStr = `${new Date().getMonth()+1}/${new Date().getDate()}`;
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: Number(e.target.value), ts: Date.now() });
            e.target.value = ''; historyPage = 1;
        }
    }

    function calculateTotalAssets() {
        let total = 0;
        items.forEach(item => {
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            total += (Number(item.holdCount) || 0) * (history.length > 0 ? history[0].price : (Number(item.holdAvg) || 0));
        });
        document.getElementById('total-asset-value').innerText = total.toLocaleString() + "원";
        document.getElementById('main-total-asset').innerText = total.toLocaleString() + "원";
    }

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            const history = item.manualHistory ? Object.values(item.manualHistory).sort((a,b) => b.ts - a.ts) : [];
            const evalAmt = (Number(item.holdCount) || 0) * (history.length > 0 ? history[0].price : (Number(item.holdAvg) || 0));
            div.className = `list-item ${lastClickedId === item.id ? 'selected-active' : ''}`;
            div.onclick = () => { currentId = item.id; lastClickedId = item.id; historyPage = 1; 
                document.getElementById('main-dashboard').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                document.getElementById('view-title').innerText = "Stock Analysis";
                syncEditor(); if(window.innerWidth <= 768) toggleMenu(); 
            };
            div.innerHTML = `<strong>${item.title || "새 종목"}</strong><div class="info-row"><small>평가: ${evalAmt.toLocaleString()}원</small><span class="target-tag">매수 ${item.t3 ? Number(item.t3).toLocaleString() : '-'}</span></div>`;
            container.appendChild(div);
        });
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;
        const historyArr = item.manualHistory ? Object.entries(item.manualHistory).map(([k, v]) => ({k, ...v})).sort((a,b) => b.ts - a.ts) : [];
        const latestPrice = historyArr.length > 0 ? historyArr[0].price : 0;
        const count = Number(item.holdCount) || 0, avg = Number(item.holdAvg) || 0;
        const profitAmt = latestPrice > 0 && avg > 0 ? (latestPrice - avg) * count : 0;
        const profitRate = latestPrice > 0 && avg > 0 ? ((latestPrice - avg) / avg * 100) : 0;

        document.getElementById('item-asset-sum').innerText = (count * (latestPrice || avg)).toLocaleString();
        document.getElementById('profit-percent').innerText = (profitRate >= 0 ? "+" : "") + profitRate.toFixed(2) + "%";
        document.getElementById('profit-amount').innerText = (profitAmt >= 0 ? "+" : "") + profitAmt.toLocaleString() + "원";
        document.getElementById('profit-percent').className = profitRate >= 0 ? "profit-pos" : "profit-neg";
        document.getElementById('profit-amount').className = profitRate >= 0 ? "profit-pos" : "profit-neg";

        const fields = {'item-title': item.title, 'hold-count': item.holdCount, 'hold-avg': item.holdAvg, 't1': item.t1, 't2': item.t2, 't3': item.t3, 'field-memo': item.memo};
        Object.entries(fields).forEach(([id, val]) => { if(document.activeElement.id !== id) document.getElementById(id).value = val || ""; });
        renderHistory(historyArr);
    }

    function renderHistory(historyArr) {
        const hList = document.getElementById('history-list');
        const pager = document.getElementById('history-pager');
        hList.innerHTML = ''; pager.innerHTML = '';
        const total = historyArr.length, maxPage = Math.ceil(total / historyLimit) || 1;
        historyArr.slice((historyPage-1)*historyLimit, historyPage*historyLimit).forEach(item => {
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `<span>${item.date}</span> <b>${item.price.toLocaleString()}원</b> <span style="color:var(--danger); cursor:pointer; font-weight:bold;" onclick="deleteHistory('${item.k}')">×</span>`;
            hList.appendChild(div);
        });
        if(total > historyLimit) {
            pager.innerHTML = `<button class="page-btn" ${historyPage===1?'disabled':''} onclick="changePage(-1)">이전</button><span>${historyPage}/${maxPage}</span><button class="page-btn" ${historyPage===maxPage?'disabled':''} onclick="changePage(1)">다음</button>`;
        }
    }
    function changePage(step) { historyPage += step; syncEditor(); }
    function updateField(f, v) { if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); }
    function deleteHistory(key) { if(confirm("삭제?")) db.ref(`stocks/${currentId}/manualHistory/${key}`).remove(); }
    function deleteStock() { if(confirm("삭제?")) { db.ref(`stocks/${currentId}`).remove(); goHome(); } }
    function addNewItem() { const ref = db.ref('stocks').push(); ref.set({ title: "새 종목 분석", holdCount: 0, holdAvg: 0 }); currentId = ref.key; lastClickedId = ref.key; syncEditor(); }
</script>
</body>
