<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Intelligence Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --sidebar-bg: #1a1c23;
            --main-bg: #f5f7fb;
            --accent: #10b981;
            --target: #3b82f6;
            --entry: #f59e0b;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-light: #9ca3af;
            --white: #ffffff;
            --active-item: #2d3139;
            --transition: all 0.3s ease;
        }

        body { margin: 0; font-family: 'Pretendard', sans-serif; display: flex; height: 100vh; background-color: var(--main-bg); overflow: hidden; }

        /* 사이드바 레이아웃 */
        #sidebar { 
            width: 280px; background: var(--sidebar-bg); color: white; 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.3s ease; z-index: 2000;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            #sidebar.open + .mobile-overlay { display: block; }
        }

        /* 총 자산 표시 영역 */
        .total-asset-box {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #2d3139;
            text-align: right;
        }
        .total-asset-box span { color: var(--text-light); font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .total-asset-box div { color: var(--accent); font-weight: 900; font-size: 1.2rem; }

        /* 종목 리스트 영역 */
        #item-list { 
            flex: 1; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: #374151 transparent;
        }
        #item-list::-webkit-scrollbar { width: 4px; }
        #item-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .list-item { 
            padding: 18px 20px; cursor: pointer; border-bottom: 1px solid #2d3139; 
            transition: var(--transition); border-left: 4px solid transparent;
        }
        .list-item:hover { background: #252830; }
        .list-item.selected-active { 
            background: var(--active-item) !important; 
            border-left-color: var(--accent);
            font-weight: bold;
        }
        .list-item strong { display: block; margin-bottom: 4px; font-size: 1rem; }
        .list-item small { color: var(--text-light); font-size: 0.8rem; }

        /* 사이드바 푸터 (버튼 영역) */
        .sidebar-footer {
            padding: 15px;
            background: #1a1c23;
            border-top: 1px solid #2d3139;
        }
        .link-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px 0; background: #2d3139; color: white;
            text-decoration: none; border-radius: 10px; font-size: 0.9rem;
            font-weight: 600; transition: var(--transition);
        }
        .link-btn:hover { background: #374151; transform: translateY(-1px); }

        /* 메인 콘텐츠 */
        #main-content { flex: 1; padding: 20px; overflow-y: auto; width: 100%; }
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .menu-btn { display: none; background: var(--sidebar-bg); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }

        .editor-container { max-width: 850px; margin: 0 auto; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 24px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 20px; }
        #item-title { flex: 1; font-size: 1.8rem; font-weight: 900; border: none; border-bottom: 2px solid transparent; color: var(--text-dark); }
        #item-title:focus { border-bottom-color: var(--accent); }

        .price-box { border: 1px solid #f1f5f9; padding: 16px; border-radius: 14px; background: #f8fafc; transition: border-color 0.2s; }
        .price-box:focus-within { border-color: var(--accent); }
        .price-box label { font-size: 0.75rem; font-weight: bold; color: var(--text-light); margin-bottom: 5px; display: block; }
        
        input, textarea { width: 100%; border: none; padding: 8px 0; font-size: 1.05rem; outline: none; background: transparent; color: var(--text-dark); font-weight: 600; }
        textarea { font-weight: 400; line-height: 1.6; resize: none; }

        .history-item { background: #f1f5f9; padding: 10px 15px; border-radius: 10px; font-size: 0.9rem; display: flex; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:25px 20px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:1.4rem; letter-spacing:-0.5px;">STOCK HUB</span>
        <button onclick="addNewItem()" style="background:var(--accent); color:white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:0.85rem;">+ 추가</button>
    </div>
    
    <div class="total-asset-box">
        <span>총 보유 자산 합계</span>
        <div id="total-asset-value">0원</div>
    </div>
    
    <div id="item-list"></div>

    <div class="sidebar-footer">
        <a href="https://ko.tradingeconomics.com/" target="_blank" class="link-btn">
            <span>📊</span> 지표 확인
        </a>
    </div>
</div>
<div class="mobile-overlay" onclick="toggleMenu()"></div>

<div id="main-content">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰ 메뉴</button>
        <h2 style="margin:0; font-size:1.4rem; font-weight:900; color:var(--text-dark);">Market Intelligence</h2>
    </div>

    <div id="placeholder" style="text-align: center; margin-top: 20vh; color: #cbd5e1;">
        <p style="font-size:5rem; margin-bottom:15px;">📊</p>
        <p style="font-weight:700; font-size:1.1rem;">분석할 종목을 선택하거나 새로 추가하세요.</p>
    </div>

    <div class="editor-container" id="editor">
        <div class="editor-header">
            <input type="text" id="item-title" placeholder="종목명 입력" oninput="updateField('title', this.value)">
            <button class="delete-btn" style="color:var(--danger); background:#fee2e2; border:none; padding:10px 18px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="deleteStock()">삭제</button>
        </div>

        <div class="card">
            <label style="font-size:0.85rem; font-weight:800; color:var(--text-dark); margin-bottom:15px; display:block;">💼 현재 보유 포지션</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="price-box">
                    <label>보유 수량</label>
                    <input type="number" id="hold-count" placeholder="0" oninput="updateField('holdCount', this.value)">
                </div>
                <div class="price-box">
                    <label>평균 단가</label>
                    <input type="number" id="hold-avg" placeholder="0" oninput="updateField('holdAvg', this.value)">
                </div>
            </div>
            <div style="margin-top:20px; text-align:right; font-weight:800; font-size:1rem;">
                평가 금액: <span id="item-asset-sum" style="color:var(--accent);">0</span>원
            </div>
        </div>

        <div class="card">
            <div class="price-box" style="background:#fffbeb; border-color:#fef3c7;">
                <label style="color:var(--entry);">🎯 희망 진입가</label>
                <input type="number" id="entry-price" style="color:var(--entry);" placeholder="진입 목표가 입력" oninput="updateField('entryPrice', this.value)">
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.85rem; font-weight:800; color:var(--text-dark); margin-bottom:15px; display:block;">🚀 매도 목표가 (T-Price)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px;">
                <div class="price-box"><label>1차</label><input type="number" id="t1" oninput="updateField('t1', this.value)"></div>
                <div class="price-box"><label>2차</label><input type="number" id="t2" oninput="updateField('t2', this.value)"></div>
                <div class="price-box"><label>3차</label><input type="number" id="t3" oninput="updateField('t3', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <label style="font-size:0.85rem; font-weight:800; color:var(--text-dark); margin-bottom:15px; display:block;">📅 종가 히스토리</label>
            <input type="number" id="manual-close-input" style="border-bottom:2px solid #f1f5f9; margin-bottom:15px;" placeholder="금액 입력 후 Enter" onkeydown="handleManualSave(event)">
            <div id="history-list"></div>
        </div>

        <div class="card">
            <label style="font-size:0.85rem; font-weight:800; color:var(--text-dark); margin-bottom:15px; display:block;">📝 투자 포인트 및 메모</label>
            <textarea id="field-memo" rows="8" placeholder="기업 가치, 주요 일정, 대응 전략을 기록하세요..." oninput="updateField('memo', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDIgzZzkJCNl_N2CTJpQzXYrxmymBqlq4A",
        authDomain: "stock-81b2d.firebaseapp.com",
        databaseURL: "https://stock-81b2d-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        projectId: "stock-81b2d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let items = [], currentId = null, lastClickedId = null;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function handleManualSave(e) {
        if(e.key === 'Enter' && e.target.value && currentId) {
            const val = e.target.value;
            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
            e.target.value = '';
            db.ref(`stocks/${currentId}/manualHistory`).push({ date: dateStr, price: val });
        }
    }

    // 데이터 감시
    db.ref('stocks').on('value', (snap) => {
        const data = snap.val();
        // ID 순서 고정 (순서 튀지 않게)
        items = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
        calculateTotalAssets();
        renderList();
        if(currentId) syncEditor();
    });

    function calculateTotalAssets() {
        let total = 0;
        items.forEach(item => total += (Number(item.holdCount) || 0) * (Number(item.holdAvg) || 0));
        document.getElementById('total-asset-value').innerText = total.toLocaleString() + "원";
    }

    function renderList() {
        const container = document.getElementById('item-list');
        container.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            const isSelected = (lastClickedId === item.id);
            div.className = `list-item ${isSelected ? 'selected-active' : ''}`;
            div.onclick = () => { 
                currentId = item.id; lastClickedId = item.id;
                selectItem(); 
                if(window.innerWidth <= 768) toggleMenu(); 
            };
            div.innerHTML = `<strong>${item.title || "새 종목"}</strong><small>진입가: ${Number(item.entryPrice || 0).toLocaleString()}원</small>`;
            container.appendChild(div);
        });
    }

    function selectItem() {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        syncEditor();
    }

    function syncEditor() {
        const item = items.find(i => i.id === currentId);
        if(!item) return;
        
        const fields = {
            'item-title': item.title, 'entry-price': item.entryPrice, 'field-memo': item.memo,
            't1': item.t1, 't2': item.t2, 't3': item.t3,
            'hold-count': item.holdCount, 'hold-avg': item.holdAvg
        };

        Object.entries(fields).forEach(([id, val]) => {
            const el = document.getElementById(id);
            if(document.activeElement !== el) el.value = val || "";
        });

        const itemSum = (Number(item.holdCount) || 0) * (Number(item.holdAvg) || 0);
        document.getElementById('item-asset-sum').innerText = itemSum.toLocaleString();

        const hList = document.getElementById('history-list');
        hList.innerHTML = '';
        if(item.manualHistory) {
            Object.entries(item.manualHistory).reverse().slice(0, 5).forEach(([key, val]) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${val.date}</span> <b>${Number(val.price).toLocaleString()}원</b> <span style="color:var(--danger); cursor:pointer; font-weight:bold;" onclick="deleteHistory('${key}')">×</span>`;
                hList.appendChild(div);
            });
        }
    }

    function updateField(f, v) { 
        if(currentId) db.ref(`stocks/${currentId}`).update({ [f]: v }); 
    }
    
    function deleteHistory(key) { 
        if(confirm("기록을 삭제할까요?")) db.ref(`stocks/${currentId}/manualHistory/${key}`).remove(); 
    }
    
    function deleteStock() { 
        if(confirm("이 종목 분석 데이터를 완전히 삭제하시겠습니까?")) { 
            db.ref(`stocks/${currentId}`).remove(); 
            currentId = null; lastClickedId = null;
            document.getElementById('editor').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
        } 
    }

    function addNewItem() {
        const ref = db.ref('stocks').push();
        ref.set({ title: "새 종목 분석", entryPrice: 0 });
        currentId = ref.key; lastClickedId = ref.key;
    }
</script>
</body>
</html>
